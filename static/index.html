<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fahamu Shamba</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f5f0e8;display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* Header */
  header{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-shrink:0}
  .logo{width:42px;height:42px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  header h1{font-size:1rem;font-weight:700}
  header p{font-size:.72rem;opacity:.85}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .status-dot{width:9px;height:9px;background:#7fff7f;border-radius:50%;box-shadow:0 0 6px #7fff7f;animation:pulse 2s infinite}

  /* Voice mode toggle */
  #voice-mode-btn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);color:#fff;padding:5px 11px;border-radius:20px;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
  #voice-mode-btn.active{background:#fff;color:#2d6a2d;font-weight:700}
  #voice-mode-btn.active .vm-dot{background:#c0392b;animation:pulse 1s infinite}
  .vm-dot{width:7px;height:7px;border-radius:50%;background:#7fff7f;display:inline-block}

  /* Quick actions */
  .quick-actions{display:flex;gap:8px;padding:9px 14px;background:#ede8dc;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #d4c9b0}
  .quick-actions::-webkit-scrollbar{display:none}
  .qa-btn{white-space:nowrap;background:#fff;border:1.5px solid #4a8c3f;color:#2d6a2d;padding:6px 12px;border-radius:20px;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
  .qa-btn:hover{background:#4a8c3f;color:#fff}

  /* Chat window */
  #chat-window{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a8c3f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
  #chat-window::-webkit-scrollbar{width:5px}
  #chat-window::-webkit-scrollbar-thumb{background:#b5a98a;border-radius:4px}

  /* Bubbles */
  .bubble-row{display:flex;align-items:flex-end;gap:8px}
  .bubble-row.user{flex-direction:row-reverse}
  .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .bot .avatar{background:#2d6a2d;color:#fff}
  .user .avatar{background:#8b6914;color:#fff}
  .bubble{max-width:75%;padding:9px 13px;border-radius:18px;font-size:.86rem;line-height:1.55;word-break:break-word}
  .bot .bubble{background:#fff;color:#2c2c2c;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .user .bubble{background:#2d6a2d;color:#fff;border-bottom-right-radius:4px}
  .bubble .time{font-size:.63rem;opacity:.55;margin-top:4px;text-align:right}
  .bubble img{max-width:100%;border-radius:10px;margin-bottom:6px;display:block}

  /* Speak button on bot bubble */
  .speak-btn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.6;margin-left:4px;vertical-align:middle;transition:opacity .2s}
  .speak-btn:hover{opacity:1}
  .speak-btn.speaking{opacity:1;animation:pulse 1s infinite}

  /* Typing dots */
  .typing-dots span{display:inline-block;width:7px;height:7px;background:#4a8c3f;border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}

  /* Image preview */
  #image-preview-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:#e8e0cc;border-top:1px solid #d4c9b0;flex-shrink:0}
  #image-preview-bar img{height:52px;width:52px;object-fit:cover;border-radius:8px;border:2px solid #4a8c3f}
  #image-preview-bar span{font-size:.78rem;color:#5a4a2a;flex:1}
  #remove-image{background:none;border:none;font-size:18px;cursor:pointer;color:#c0392b}

  /* Voice listening overlay */
  #voice-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  #voice-overlay.show{display:flex}
  .voice-ring{width:90px;height:90px;border-radius:50%;background:#2d6a2d;display:flex;align-items:center;justify-content:center;font-size:36px;animation:ring 1.2s ease-in-out infinite}
  @keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(45,106,45,.6)}70%{box-shadow:0 0 0 22px rgba(45,106,45,0)}}
  #voice-overlay p{color:#fff;font-size:1rem;font-weight:600}
  #voice-overlay small{color:rgba(255,255,255,.7);font-size:.8rem}
  #stop-voice-btn{background:#c0392b;color:#fff;border:none;padding:10px 24px;border-radius:24px;font-size:.85rem;cursor:pointer;margin-top:8px}

  /* Input bar */
  .input-bar{display:flex;align-items:center;gap:7px;padding:9px 12px;background:#ede8dc;border-top:1px solid #d4c9b0;flex-shrink:0}
  #user-input{flex:1;border:1.5px solid #c4b896;border-radius:24px;padding:9px 15px;font-size:.86rem;background:#fff;outline:none;color:#2c2c2c;transition:border .2s}
  #user-input:focus{border-color:#4a8c3f}
  #user-input::placeholder{color:#a89870}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0}
  #img-btn{background:#e8e0cc;color:#5a4a2a}
  #img-btn:hover{background:#d4c9b0}
  #mic-btn{background:#e8e0cc;color:#5a4a2a}
  #mic-btn:hover{background:#d4c9b0}
  #mic-btn.recording{background:#c0392b;color:#fff;animation:pulse 1s infinite}
  #send-btn{background:#2d6a2d;color:#fff}
  #send-btn:hover{background:#4a8c3f;transform:scale(1.05)}

  /* Welcome */
  .welcome-card{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;border-radius:16px;padding:16px;text-align:center}
  .welcome-card h2{font-size:.95rem;margin-bottom:4px}
  .welcome-card p{font-size:.76rem;opacity:.9}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
</style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div>
    <h1>Fahamu Shamba</h1>
    <p>Your Farming Advisor</p>
  </div>
  <div class="header-right">
    <button id="voice-mode-btn"><span class="vm-dot"></span> Voice Mode</button>
    <div class="status-dot"></div>
  </div>
</header>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('🌾 Best Crop to Plant in Kenya right now')">🌾 Best Crop</button>
  <button class="qa-btn" onclick="quickAsk('☀️ Weather update and planting advice for Kenyan farmers')">☀️ Weather</button>
  <button class="qa-btn" onclick="quickAsk('🐛 Common pest and disease tips for crops in Kenya')">🐛 Pest Tips</button>
  <button class="qa-btn" onclick="quickAsk('📈 Current market prices for crops in Kenya')">📈 Market Prices</button>
  <button class="qa-btn" onclick="document.getElementById('file-input').click()">📷 Upload Crop Image</button>
</div>

<div id="chat-window">
  <div class="welcome-card">
    <h2>🌱 Karibu! Welcome to Fahamu Shamba</h2>
    <p>Ask me about crops, weather, pests, or markets. Upload a crop photo for pest/disease diagnosis. Enable Voice Mode to talk hands-free!</p>
  </div>
</div>

<!-- Image preview bar -->
<div id="image-preview-bar">
  <img id="preview-thumb" src="" alt="preview"/>
  <span id="preview-name">Image ready</span>
  <button id="remove-image" title="Remove">✕</button>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" capture="environment" style="display:none"/>

<div class="input-bar">
  <button class="icon-btn" id="img-btn" title="Upload image">📷</button>
  <input type="text" id="user-input" placeholder="Ask about crops, weather, markets..."/>
  <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
  <button class="icon-btn" id="send-btn" title="Send">➤</button>
</div>

<!-- Voice conversation overlay -->
<div id="voice-overlay">
  <div class="voice-ring">🎤</div>
  <p id="voice-status">Listening...</p>
  <small id="voice-transcript"></small>
  <button id="stop-voice-btn">Stop Listening</button>
</div>

<script>
const chatWindow = document.getElementById('chat-window');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const imgBtn = document.getElementById('img-btn');
const fileInput = document.getElementById('file-input');
const previewBar = document.getElementById('image-preview-bar');
const previewThumb = document.getElementById('preview-thumb');
const previewName = document.getElementById('preview-name');
const removeImageBtn = document.getElementById('remove-image');
const voiceModeBtn = document.getElementById('voice-mode-btn');
const voiceOverlay = document.getElementById('voice-overlay');
const voiceStatus = document.getElementById('voice-status');
const voiceTranscript = document.getElementById('voice-transcript');
const stopVoiceBtn = document.getElementById('stop-voice-btn');

let selectedFile = null;
let voiceModeActive = false;
let isSpeaking = false;
let currentSpeech = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addBubble(html, role, imageUrl = null) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const avatar = role === 'bot' ? '🌾' : '👨‍🌾';
  const imgTag = imageUrl ? `<img src="${imageUrl}" alt="uploaded crop"/>` : '';
  const speakBtn = role === 'bot' ? `<button class="speak-btn" title="Listen" onclick="speakText(this)">🔊</button>` : '';
  row.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${imgTag}${html}${speakBtn}<div class="time">${getTime()}</div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return row;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'bubble-row bot';
  row.id = 'typing-indicator';
  row.innerHTML = `<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speakText(btn) {
  window.speechSynthesis.cancel();
  if (btn && btn.classList.contains('speaking')) {
    btn.classList.remove('speaking');
    return;
  }
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
  const text = btn.parentElement.innerText.replace(/\d{1,2}:\d{2}\s*(AM|PM)?/i,'').trim();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-KE';
  utt.rate = 0.92;
  if (btn) {
    btn.classList.add('speaking');
    utt.onend = () => btn.classList.remove('speaking');
  }
  currentSpeech = utt;
  window.speechSynthesis.speak(utt);
}

function speakReply(text) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-KE';
  utt.rate = 0.92;
  utt.onend = () => {
    isSpeaking = false;
    if (voiceModeActive) startListening();
  };
  utt.onstart = () => isSpeaking = true;
  window.speechSynthesis.speak(utt);
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage(text, autoSpeak = false) {
  if (!text.trim() && !selectedFile) return;

  if (selectedFile) {
    const objectUrl = URL.createObjectURL(selectedFile);
    addBubble(text || 'Analyze this crop image for pests or diseases.', 'user', objectUrl);
  } else {
    addBubble(text, 'user');
  }

  input.value = '';
  showTyping();

  try {
    let reply;
    if (selectedFile) {
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('message', text || 'Identify any pest, disease, or crop condition in this image.');
      const res = await fetch('/analyze-image', {method:'POST', body: formData});
      const data = await res.json();
      reply = data.reply;
    } else {
      const res = await fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message: text})
      });
      const data = await res.json();
      reply = data.reply;
    }

    removeTyping();
    clearImagePreview();
    addBubble(reply.replace(/\n/g,'<br>'), 'bot');
    if (autoSpeak || voiceModeActive) speakReply(reply);

  } catch {
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.', 'bot');
  }
}

function quickAsk(text) { sendMessage(text, false); }

sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

// ── Image upload ──────────────────────────────────────────────────────────────
function clearImagePreview() {
  selectedFile = null;
  previewBar.style.display = 'none';
  previewThumb.src = '';
  fileInput.value = '';
}

function handleFileSelect(file) {
  if (!file) return;
  selectedFile = file;
  previewThumb.src = URL.createObjectURL(file);
  previewName.textContent = file.name;
  previewBar.style.display = 'flex';
  input.placeholder = 'Add a question about this image (optional)...';
  input.focus();
}

imgBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFileSelect(e.target.files[0]));
removeImageBtn.addEventListener('click', () => {
  clearImagePreview();
  input.placeholder = 'Ask about crops, weather, markets...';
});

// Drag & drop onto chat window
chatWindow.addEventListener('dragover', e => e.preventDefault());
chatWindow.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFileSelect(file);
});

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SR) {
  recognition = new SR();
  recognition.lang = 'en-KE';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    if (voiceModeActive) {
      voiceTranscript.textContent = `"${transcript}"`;
    } else {
      input.value = transcript;
    }
    if (e.results[e.results.length - 1].isFinal) {
      if (voiceModeActive) {
        voiceStatus.textContent = 'Processing...';
        sendMessage(transcript, true);
      }
    }
  };

  recognition.onend = () => {
    micBtn.classList.remove('recording');
    if (voiceModeActive && !isSpeaking) {
      setTimeout(startListening, 800);
    }
  };

  recognition.onerror = e => {
    micBtn.classList.remove('recording');
    if (voiceModeActive && e.error !== 'aborted') {
      voiceStatus.textContent = 'Listening...';
      setTimeout(startListening, 1000);
    }
  };

  // Single mic button (non-voice-mode)
  micBtn.addEventListener('click', () => {
    if (voiceModeActive) return;
    if (micBtn.classList.contains('recording')) {
      recognition.stop();
    } else {
      micBtn.classList.add('recording');
      recognition.start();
    }
  });
} else {
  micBtn.style.opacity = '0.4';
  micBtn.title = 'Voice not supported in this browser';
  voiceModeBtn.style.opacity = '0.4';
  voiceModeBtn.disabled = true;
}

// ── Voice Mode ────────────────────────────────────────────────────────────────
function startListening() {
  if (!recognition || isSpeaking) return;
  try {
    voiceStatus.textContent = 'Listening...';
    voiceTranscript.textContent = '';
    recognition.start();
  } catch(e) {}
}

function stopVoiceMode() {
  voiceModeActive = false;
  voiceModeBtn.classList.remove('active');
  voiceModeBtn.innerHTML = '<span class="vm-dot"></span> Voice Mode';
  voiceOverlay.classList.remove('show');
  window.speechSynthesis.cancel();
  try { recognition && recognition.stop(); } catch(e) {}
}

voiceModeBtn.addEventListener('click', () => {
  if (!SR) return;
  if (voiceModeActive) {
    stopVoiceMode();
  } else {
    voiceModeActive = true;
    voiceModeBtn.classList.add('active');
    voiceModeBtn.innerHTML = '<span class="vm-dot"></span> Stop Voice';
    voiceOverlay.classList.add('show');
    // Greet farmer
    const greet = new SpeechSynthesisUtterance('Hello! I am Fahamu Shamba, your farming advisor. How can I help you today?');
    greet.lang = 'en-KE';
    greet.onend = () => { isSpeaking = false; startListening(); };
    isSpeaking = true;
    window.speechSynthesis.speak(greet);
  }
});

stopVoiceBtn.addEventListener('click', stopVoiceMode);
</script>
</body>
</html>
