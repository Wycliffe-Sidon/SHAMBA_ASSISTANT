<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Fahamu Shamba AI - Intelligent AI-powered farming assistant providing personalized crop recommendations, weather insights, pest management, and market prices for African farmers."/>
<title>Fahamu Shamba AI - Smart Farming Assistant</title>
<style>
/* ── CSS VARIABLES ────────────────────────────────────────────────────────── */
:root {
  --primary-color: #4a7c59; /* Earthy green */
  --primary-light: #6b9e78;
  --accent-color: #d2b48c; /* Beige */
  --accent-dark: #b8860b; /* Darker beige */
  --text-primary: #2c2c2c;
  --text-secondary: #6b6b6b;
  --bg-primary: #fefefe; /* Off-white */
  --bg-secondary: #f5f5dc; /* Beige background */
  --bg-light: #faf0e6; /* Linen */
  --border-color: #d2b48c; /* Beige border */
  --success: #228b22; /* Forest green */
  --error: #8b4513; /* Saddle brown */
  --warning: #daa520; /* Goldenrod */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(74, 124, 89, 0.15);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.3);
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body.dark-theme {
  --bg-primary: #111111;
  --bg-secondary: #121212;
  --bg-light: #1f1f1f;
  --text-primary: #f4f4f4;
  --text-secondary: #c5c5c5;
  --border-color: rgba(255,255,255,0.12);
  --accent-color: #a18553;
  --accent-dark: #7f693f;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.55);
}

/* ── RESET & BASE STYLES ─────────────────────────────────────────────────── */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-secondary);
  display: flex;
  flex-direction: row;
  height: 100vh;
  color: var(--text-primary);
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
.sidebar {
  width: 280px;
  background: linear-gradient(180deg, var(--bg-light), var(--accent-color));
  border-right: 2px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  box-shadow: var(--shadow-md);
}

.farmer-profile {
  padding: 20px;
  border-bottom: 1px solid var(--border-color);
  background: var(--primary-color);
  color: var(--bg-primary);
}

.farmer-profile h3 {
  margin: 0 0 10px 0;
  font-size: 1.2rem;
  font-weight: 700;
}

.farmer-profile p {
  margin: 5px 0;
  font-size: 0.9rem;
  opacity: 0.9;
}

.sidebar-menu {
  flex: 1;
  padding: 20px 0;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-left: 4px solid transparent;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
}

.menu-item:hover {
  background: rgba(74, 124, 89, 0.1);
  border-left-color: var(--primary-color);
}

.menu-item.active {
  background: rgba(74, 124, 89, 0.2);
  border-left-color: var(--primary-color);
}

.menu-icon {
  font-size: 1.5rem;
  width: 30px;
  text-align: center;
}

.new-chat-btn {
  margin: 20px;
  padding: 12px;
  background: var(--primary-color);
  color: var(--bg-primary);
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.new-chat-btn:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
}

/* ── MAIN PANEL ──────────────────────────────────────────────────────────── */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
}

.main-header {
  padding: 20px 30px;
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.main-header h1 {
  font-size: 2rem;
  font-weight: 700;
  margin: 0 0 5px 0;
}

.main-header p {
  font-size: 1.1rem;
  opacity: 0.9;
  margin: 0;
}

.language-toggle {
  position: absolute;
  top: 20px;
  right: 30px;
  display: flex;
  gap: 10px;
}

.lang-btn {
  padding: 8px 12px;
  background: rgba(255, 255, 255, 0.2);
  color: var(--bg-primary);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  transition: var(--transition);
}

.lang-btn.active {
  background: var(--bg-primary);
  color: var(--primary-color);
}

.lang-btn:hover {
  background: rgba(255, 255, 255, 0.3);
}

.theme-panel,
.location-panel {
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 18px;
  margin: 18px 20px;
}

.theme-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel-title {
  font-size: 0.9rem;
  color: var(--text-primary);
  font-weight: 700;
  margin-bottom: 10px;
}

.theme-btn {
  padding: 10px 14px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  cursor: pointer;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-weight: 600;
  transition: var(--transition);
}

.theme-btn.active {
  background: var(--primary-color);
  color: var(--bg-primary);
  border-color: var(--primary-color);
}

.village-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 10px;
}

.chat-meta-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: space-between;
  padding: 14px 30px;
  background: var(--bg-light);
  border-bottom: 1px solid var(--border-color);
}

.chat-meta-bar .meta-item {
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.chat-meta-bar .meta-item strong {
  color: var(--text-primary);
  font-weight: 700;
}

/* ── HEADER ───────────────────────────────────────────────────────────────── */
header {
  background: var(--bg-primary);
  color: var(--text-primary);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  position: relative;
  z-index: 10;
}

.logo {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.2);
}

header .brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

header h1 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

header p {
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.status-text {
  font-size: 0.7rem;
  color: var(--success);
  font-weight: 600;
}

/* ── TAB NAVIGATION ───────────────────────────────────────────────────────── */
.tab-nav {
  display: flex;
  gap: 0;
  padding: 0;
  background: var(--bg-primary);
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
}

.tab-nav::-webkit-scrollbar {
  height: 4px;
}

.tab-nav::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 2px;
}

.tab-btn {
  white-space: nowrap;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-secondary);
  padding: 12px 16px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(45, 106, 45, 0.05);
}

.tab-btn.active {
  color: var(--primary-color);
  border-bottom-color: var(--primary-color);
  background: rgba(45, 106, 45, 0.08);
}

/* ── LOCATION BAR ─────────────────────────────────────────────────────────── */
.location-bar {
  background: var(--bg-light);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.location-icon {
  font-size: 16px;
}

.location-text {
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex: 1;
}

.location-text span {
  color: var(--text-primary);
  font-weight: 600;
}

.location-edit {
  font-size: 0.75rem;
  color: var(--accent-color);
  background: transparent;
  border: 1.5px solid var(--accent-color);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: var(--transition);
}

.location-edit:hover {
  background: var(--accent-color);
  color: var(--bg-primary);
}

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}

.modal.show {
  display: flex;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.modal-content {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
}

.modal-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border-color);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: inherit;
  background: var(--bg-secondary);
  color: var(--text-primary);
  transition: var(--transition);
}

.form-select:hover {
  border-color: var(--primary-color);
}

.form-select:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(45, 106, 45, 0.1);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-cancel {
  background: var(--bg-light);
  color: var(--text-secondary);
  border: 1px solid var(--border-color);
}

.btn-cancel:hover {
  background: var(--border-color);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(45, 106, 45, 0.4);
}

/* ── CHAT WINDOW ──────────────────────────────────────────────────────────── */
#chat-window {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  background: var(--bg-primary);
}

#chat-window::-webkit-scrollbar {
  width: 6px;
}

#chat-window::-webkit-scrollbar-track {
  background: transparent;
}

#chat-window::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

#chat-window::-webkit-scrollbar-thumb:hover {
  background: var(--text-secondary);
}

/* ── MESSAGE BUBBLES ──────────────────────────────────────────────────────── */
.bubble-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  max-width: 100%;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.bubble-row.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.bot .avatar {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.2);
}

.user .avatar {
  background: linear-gradient(135deg, #5436da, #7c3aed);
  color: var(--bg-primary);
}

.bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.6;
  word-break: break-word;
  box-shadow: var(--shadow-sm);
}

.bot .bubble {
  background: var(--bg-light);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.user .bubble {
  background: linear-gradient(135deg, #5436da, #7c3aed);
  color: var(--bg-primary);
  border-bottom-right-radius: 4px;
}

.bubble-text {
  display: block;
}

.bubble img {
  max-width: 100%;
  border-radius: 10px;
  margin-bottom: 8px;
  display: block;
}

.meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 6px;
}

.time {
  font-size: 0.7rem;
  opacity: 0.6;
}

.speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 3px 4px;
  opacity: 0.5;
  transition: var(--transition);
}

.speak-btn:hover {
  opacity: 0.8;
}

.speak-btn.active {
  opacity: 1;
  animation: blink 0.8s infinite;
}

/* ── CROP RECOMMENDATION CARDS ────────────────────────────────────────────── */
.crop-card {
  background: var(--bg-primary);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 16px;
  margin: 8px 0;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.crop-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--primary-color);
  transform: translateY(-3px);
}

.crop-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(180deg, var(--primary-color), var(--primary-light));
}

.crop-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.crop-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.crop-score {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  box-shadow: 0 2px 6px rgba(45, 106, 45, 0.3);
}

.crop-details {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-top: 10px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg-light);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── TYPING INDICATOR ─────────────────────────────────────────────────────── */
.typing-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--primary-light);
  border-radius: 50%;
  margin: 0 3px;
  animation: bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.4s;
}

/* ── INPUT BAR ────────────────────────────────────────────────────────────── */
.input-bar {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 20px 30px;
  background: var(--bg-light);
  border-top: 2px solid var(--border-color);
  flex-shrink: 0;
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.02);
}

#user-input {
  flex: 1;
  border: 1.5px solid var(--border-color);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 0.9rem;
  background: var(--bg-secondary);
  outline: none;
  color: var(--text-primary);
  transition: var(--transition);
  resize: none;
  max-height: 100px;
}

#user-input:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(45, 106, 45, 0.1);
  background: var(--bg-primary);
}

#user-input::placeholder {
  color: var(--text-secondary);
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: var(--transition);
  flex-shrink: 0;
  background: var(--bg-light);
  color: var(--text-secondary);
}

.icon-btn:hover {
  background: var(--border-color);
  transform: scale(1.05);
}

.icon-btn:active {
  transform: scale(0.95);
}

#send-btn {
  background: linear-gradient(135deg, var(--accent-color), var(--accent-dark));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(16, 163, 127, 0.3);
}

#send-btn:hover {
  transform: scale(1.05);
}

#send-btn:disabled {
  background: var(--border-color);
  cursor: not-allowed;
  opacity: 0.5;
}

#mic-btn.recording {
  background: var(--error);
  color: var(--bg-primary);
  animation: pulse 1s infinite;
}

/* ── HAMBURGER MENU ─────────────────────────────────────────────────────── */
.hamburger {
  display: none;
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  background: var(--primary-color);
  color: var(--bg-primary);
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1.2rem;
}

.sidebar.mobile-hidden {
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

.sidebar.mobile-visible {
  transform: translateX(0);
  transition: transform 0.3s ease;
}

.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 999;
}

/* ── SECTION HEADERS ──────────────────────────────────────────────────────── */
.section-header {
  background: linear-gradient(135deg, #f0f8f0, #e8f5e8);
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 16px;
  border-left: 4px solid var(--primary-color);
  box-shadow: var(--shadow-sm);
}

.section-header h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary-color);
  margin-bottom: 6px;
}

.section-header p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ── INFO CARDS ───────────────────────────────────────────────────────────── */
.info-card {
  background: var(--bg-light);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px;
  margin: 10px 0;
  transition: var(--transition);
}

.info-card:hover {
  box-shadow: var(--shadow-sm);
  border-color: var(--accent-color);
}

.info-card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-card-content {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.price-tag {
  background: var(--primary-color);
  color: var(--bg-primary);
  padding: 4px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 0.85rem;
  display: inline-block;
}

.trend-up {
  color: var(--success);
  font-weight: 700;
}

.trend-down {
  color: var(--error);
  font-weight: 700;
}

.trend-stable {
  color: var(--text-secondary);
  font-weight: 700;
}

/* ── ANIMATIONS ───────────────────────────────────────────────────────────── */
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── RESPONSIVE DESIGN ────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .hamburger {
    display: block;
  }
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 1000;
    transform: translateX(-100%);
  }
  .sidebar.mobile-visible {
    transform: translateX(0);
  }
  .main-header {
    padding: 15px 20px;
  }
  .main-header h1 {
    font-size: 1.5rem;
  }
  .main-header p {
    font-size: 0.9rem;
  }
  .language-toggle {
    position: static;
    justify-content: center;
    margin-top: 10px;
  }
  #chat-window {
    padding: 15px 20px;
  }
  .input-bar {
    padding: 15px 20px;
  }
  .bubble {
    font-size: 0.9rem;
    padding: 10px 14px;
  }
  .avatar {
    width: 32px;
    height: 32px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="farmer-profile">
    <h3>Fahamu Shamba</h3>
    <p>Your intelligent farming assistant</p>
  </div>
  <div class="location-panel">
    <div class="panel-title">Location settings</div>
    <label class="form-label" for="countySelect">County</label>
    <select id="countySelect" class="form-select">
      <option value="">Select county</option>
    </select>
    <label class="form-label" for="sublocationSelect">Sub-location</label>
    <select id="sublocationSelect" class="form-select" disabled>
      <option value="">Select sub-location</option>
    </select>
    <div class="village-panel">
      <span>Village detected:</span>
      <strong id="villageText">Not detected yet</strong>
    </div>
    <button class="btn btn-primary" id="detect-village" type="button">Detect Village</button>
  </div>
  <div class="theme-panel">
    <div class="panel-title">Theme</div>
    <button class="theme-btn active" data-theme="light" type="button">Light</button>
    <button class="theme-btn" data-theme="dark" type="button">Dark</button>
  </div>
  <div class="sidebar-menu">
    <div class="menu-item active" data-function="crops">
      <span class="menu-icon">🌾</span>
      <span>Best Crop</span>
    </div>
    <div class="menu-item" data-function="weather">
      <span class="menu-icon">☀️</span>
      <span>Weather</span>
    </div>
    <div class="menu-item" data-function="pests">
      <span class="menu-icon">🐛</span>
      <span>Pest & Disease</span>
    </div>
    <div class="menu-item" data-function="market">
      <span class="menu-icon">📈</span>
      <span>Market Prices</span>
    </div>
    <div class="menu-item" data-function="general">
      <span class="menu-icon">💬</span>
      <span>General Advice</span>
    </div>
  </div>
  <button class="new-chat-btn" id="new-chat-btn" type="button">New Chat</button>
</div>

<div class="main-panel">
  <div class="main-header">
    <h1>I am your Fahamu-Shamba</h1>
    <p>How can I assist you today?</p>
    <div class="language-toggle">
      <button class="lang-btn active" data-lang="en" type="button">English</button>
      <button class="lang-btn" data-lang="sw" type="button">Kiswahili</button>
      <button class="lang-btn" data-lang="luo" type="button">Luo</button>
    </div>
  </div>
  <div class="chat-meta-bar">
    <div class="meta-item">County: <strong id="locationDisplay">Not selected</strong></div>
    <div class="meta-item">Theme: <strong id="themeDisplay">Light</strong></div>
  </div>
  <div id="chat-window"></div>
  <div class="input-bar">
    <input type="text" id="user-input" placeholder="Ask me anything about farming..." />
    <button class="icon-btn" id="mic-btn" title="Voice input" type="button">🎤</button>
    <button class="icon-btn" id="send-btn" type="button">➤</button>
  </div>
</div>

<script>
const chatWindow = document.getElementById('chat-window');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const hamburger = document.getElementById('hamburger');
const overlay = document.getElementById('overlay');
const sidebar = document.getElementById('sidebar');
const menuItems = document.querySelectorAll('.menu-item');
const langBtns = document.querySelectorAll('.lang-btn');
const newChatBtn = document.getElementById('new-chat-btn');
const countySelect = document.getElementById('countySelect');
const sublocationSelect = document.getElementById('sublocationSelect');
const villageText = document.getElementById('villageText');
const detectVillageBtn = document.getElementById('detect-village');
const themeBtns = document.querySelectorAll('.theme-btn');
const locationDisplay = document.getElementById('locationDisplay');
const themeDisplay = document.getElementById('themeDisplay');

let activeSpeakBtn = null;
let currentSessionId = 'session_' + Date.now();
let isSpeaking = false;
let currentUtterance = null;
let currentFunction = 'crops';
let currentLang = 'en';
let currentCounty = '';
let currentSublocation = '';
let currentVillage = '';
let currentTheme = localStorage.getItem('farmTheme') || 'light';

const countySublocations = {
  Nairobi: ['Westlands', 'Kibera', 'Embakasi', 'Langata'],
  Kiambu: ['Thika', 'Limuru', 'Kiambu Town', 'Githunguri'],
  Nakuru: ['Nakuru Town', 'Gilgil', 'Naivasha', 'Molo'],
  Kisumu: ['Kisumu City', 'Kibos', 'Migosi', 'Kendu Bay'],
  Siaya: ['Siaya Town', 'Bondo', 'Ugunja', 'Alego'],
  Kakamega: ['Kakamega Town', 'Mumias', 'Ikolomani', 'Lurambi'],
  Bungoma: ['Bungoma Town', 'Webuye', 'Kimilili', 'Bokoli'],
  Meru: ['Meru Town', 'Maua', 'Igembe', 'Buuri'],
  Embu: ['Embu Town', 'Kiritiri', 'Mbeere', 'Runyenjes'],
  Machakos: ['Machakos Town', 'Mlolongo', 'Yatta', 'Kangundo'],
  Kitui: ['Kitui Town', 'Mwingi', 'Mutomo', 'Kanziko'],
  Nyeri: ['Nyeri Town', 'Karatina', 'Kieni', 'Othaya'],
  "Murang'a": ['Murang\'a Town', 'Kangema', 'Maragua', 'Kiharu'],
  Kirinyaga: ['Kerugoya', 'Kutus', 'Mwea', 'Sagana'],
  'Uasin Gishu': ['Eldoret', 'Turbo', 'Kapsabet', 'Maili Tisa']
};

const now = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

function setTheme(theme) {
  currentTheme = theme;
  document.body.classList.toggle('dark-theme', theme === 'dark');
  themeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
  themeDisplay.textContent = theme === 'dark' ? 'Dark' : 'Light';
  localStorage.setItem('farmTheme', theme);
}

function updatePlaceholders() {
  const placeholders = {
    en: 'Ask me anything about farming...',
    sw: 'Uliza kuhusu kilimo...',
    luo: 'Penj kuhusu puodho...'
  };
  userInput.placeholder = placeholders[currentLang] || placeholders.en;
}

function populateCountyOptions() {
  Object.keys(countySublocations).sort().forEach(county => {
    const option = document.createElement('option');
    option.value = county;
    option.textContent = county;
    countySelect.appendChild(option);
  });
}

function populateSublocations(county) {
  sublocationSelect.innerHTML = '<option value="">Select sub-location</option>';
  if (!county || !countySublocations[county]) {
    sublocationSelect.disabled = true;
    return;
  }
  countySublocations[county].forEach(location => {
    const option = document.createElement('option');
    option.value = location;
    option.textContent = location;
    sublocationSelect.appendChild(option);
  });
  sublocationSelect.disabled = false;
}

function getVillageNameFromCoords(lat, lng) {
  if (currentCounty === 'Nairobi') return 'Nearby Nairobi village';
  if (currentCounty === 'Kiambu') return 'Nearby Kiambu village';
  if (currentCounty === 'Kisumu') return 'Nearby Kisumu village';
  if (currentCounty === 'Nakuru') return 'Nearby Nakuru village';
  return `Village near ${lat.toFixed(2)}, ${lng.toFixed(2)}`;
}

function updateLocationDisplay() {
  locationDisplay.textContent = currentCounty && currentSublocation ? `${currentSublocation}, ${currentCounty}` : 'Not selected';
  villageText.textContent = currentVillage || 'Detect your village';
}

function detectVillage() {
  if (!navigator.geolocation) {
    currentVillage = 'Geolocation unavailable';
    updateLocationDisplay();
    return;
  }
  detectVillageBtn.disabled = true;
  detectVillageBtn.textContent = 'Detecting...';
  navigator.geolocation.getCurrentPosition(position => {
    currentVillage = getVillageNameFromCoords(position.coords.latitude, position.coords.longitude);
    updateLocationDisplay();
    detectVillageBtn.disabled = false;
    detectVillageBtn.textContent = 'Detect Village';
  }, () => {
    currentVillage = 'Unable to detect village';
    updateLocationDisplay();
    detectVillageBtn.disabled = false;
    detectVillageBtn.textContent = 'Detect Village';
  }, { timeout: 10000 });
}

function createBotIntro() {
  addBubble('I am your Fahamu-Shamba — how can I assist you today?', 'bot');
}

// Hamburger menu toggle
hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('mobile-visible');
  overlay.style.display = sidebar.classList.contains('mobile-visible') ? 'block' : 'none';
});

overlay.addEventListener('click', () => {
  sidebar.classList.remove('mobile-visible');
  overlay.style.display = 'none';
});

// Menu item clicks
menuItems.forEach(item => {
  item.addEventListener('click', () => {
    menuItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentFunction = item.dataset.function;
    if (window.innerWidth <= 767) {
      sidebar.classList.remove('mobile-visible');
      overlay.style.display = 'none';
    }
  });
});

// Language toggle
langBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    langBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    updatePlaceholders();
  });
});

function addBubble(htmlText, role, lang = currentLang) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const speakBtnHtml = role === 'bot' ? `<button class="speak-btn" title="Read aloud" data-text="" data-lang="${lang}">🔊</button>` : '';
  row.innerHTML = `
    <div class="avatar">${role === 'bot' ? '🌾' : '👨🌾'}</div>
    <div class="bubble">
      <span class="bubble-text">${htmlText}</span>
      <div class="meta">
        ${speakBtnHtml}
        <span class="time">${now()}</span>
      </div>
    </div>`;
  if (role === 'bot') {
    const plain = htmlText.replace(/<br\s*\/?>/gi, ' ').replace(/<[^>]+>/g, '');
    const speakBtn = row.querySelector('.speak-btn');
    speakBtn.dataset.text = plain;
    speakBtn.addEventListener('click', function() { onSpeakBtn(this); });
  }
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return row;
}

function showTyping() {
  removeTyping();
  const row = document.createElement('div');
  row.id = 'typing-row';
  row.className = 'bubble-row bot';
  row.innerHTML = `<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  currentUtterance = null;
  if (activeSpeakBtn) {
    activeSpeakBtn.classList.remove('active');
    activeSpeakBtn = null;
  }
}

function speak(text, onDone, lang = currentLang) {
  stopSpeaking();
  isSpeaking = true;
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  let i = 0;
  function next() {
    if (i >= sentences.length || !isSpeaking) {
      isSpeaking = false;
      if (onDone) onDone();
      return;
    }
    currentUtterance = new SpeechSynthesisUtterance(sentences[i++].trim());
    currentUtterance.lang = lang === 'sw' ? 'sw-KE' : 'en-US';
    currentUtterance.rate = 0.93;
    currentUtterance.onend = next;
    currentUtterance.onerror = next;
    window.speechSynthesis.speak(currentUtterance);
  }
  next();
}

function onSpeakBtn(btn) {
  if (btn.classList.contains('active')) {
    stopSpeaking();
    return;
  }
  stopSpeaking();
  activeSpeakBtn = btn;
  btn.classList.add('active');
  speak(btn.dataset.text, () => {
    btn.classList.remove('active');
    activeSpeakBtn = null;
  }, btn.dataset.lang);
}

async function fetchReply(text) {
  if (isSpeaking) stopSpeaking();
  const payload = {
    message: text,
    session_id: currentSessionId,
    county: currentCounty,
    sublocation: currentSublocation,
    village: currentVillage,
    context: currentFunction
  };
  const response = await fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!response.ok) {
    throw new Error('Chat API failed');
  }
  return response.json();
}

async function sendMessage(text) {
  text = (text || '').trim();
  if (!text) return;
  if (!currentCounty || !currentSublocation) {
    addBubble('Please choose your county and sub-location first so Fahamu-Shamba can make the right location-based decision.', 'bot');
    return;
  }
  addBubble(text, 'user');
  userInput.value = '';
  showTyping();
  try {
    const data = await fetchReply(text);
    removeTyping();
    addBubble((data.reply || 'Sorry, something went wrong.').replace(/\n/g, '<br>'), 'bot', data.language || currentLang);
  } catch (error) {
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.', 'bot');
  }
}

newChatBtn.addEventListener('click', () => {
  chatWindow.innerHTML = '';
  currentSessionId = 'session_' + Date.now();
  createBotIntro();
});

sendBtn.addEventListener('click', () => sendMessage(userInput.value));
userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(userInput.value); });

countySelect.addEventListener('change', () => {
  currentCounty = countySelect.value;
  currentSublocation = '';
  populateSublocations(currentCounty);
  updateLocationDisplay();
});

sublocationSelect.addEventListener('change', () => {
  currentSublocation = sublocationSelect.value;
  updateLocationDisplay();
});

detectVillageBtn.addEventListener('click', detectVillage);

themeBtns.forEach(btn => btn.addEventListener('click', () => setTheme(btn.dataset.theme)));

const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
document.addEventListener('click', () => {
  const u = new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
}, { once: true });

if (SRClass) {
  let recog = null;
  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('recording')) {
      if (recog) recog.stop();
      micBtn.classList.remove('recording');
      return;
    }
    recog = new SRClass();
    recog.lang = 'en-US';
    recog.continuous = false;
    recog.interimResults = true;
    recog.onresult = e => {
      userInput.value = Array.from(e.results).map(r => r[0].transcript).join('');
    };
    recog.onend = () => micBtn.classList.remove('recording');
    recog.onerror = () => micBtn.classList.remove('recording');
    micBtn.classList.add('recording');
    try { recog.start(); } catch (err) { micBtn.classList.remove('recording'); }
  });
} else {
  micBtn.disabled = true;
  micBtn.style.opacity = '.4';
}

window.addEventListener('DOMContentLoaded', () => {
  populateCountyOptions();
  setTheme(currentTheme);
  updatePlaceholders();
  updateLocationDisplay();
  createBotIntro();
  detectVillage();
});

</script>
</body>
</html>
