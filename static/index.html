<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
<title>Fahamu Shamba</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f0e8;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* Header */
header{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-shrink:0}
.logo{width:42px;height:42px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
header h1{font-size:1rem;font-weight:700}
header p{font-size:.72rem;opacity:.85}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-dot{width:9px;height:9px;background:#7fff7f;border-radius:50%;box-shadow:0 0 6px #7fff7f;animation:blink 2s infinite}

#voice-mode-btn{
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.6);
  color:#fff;padding:6px 13px;border-radius:20px;
  font-size:.75rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .25s
}
#voice-mode-btn.active{background:#fff;color:#2d6a2d}
.vm-dot{width:8px;height:8px;border-radius:50%;background:#7fff7f;transition:background .3s}
#voice-mode-btn.active .vm-dot{background:#c0392b;animation:blink .8s infinite}

/* Quick actions */
.quick-actions{display:flex;gap:8px;padding:9px 14px;background:#ede8dc;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #d4c9b0}
.quick-actions::-webkit-scrollbar{display:none}
.qa-btn{white-space:nowrap;background:#fff;border:1.5px solid #4a8c3f;color:#2d6a2d;padding:6px 12px;border-radius:20px;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.qa-btn:hover{background:#4a8c3f;color:#fff}

/* Chat */
#chat-window{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px;display:flex;flex-direction:column;gap:10px;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%234a8c3f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
#chat-window::-webkit-scrollbar{width:5px}
#chat-window::-webkit-scrollbar-thumb{background:#b5a98a;border-radius:4px}

/* Bubbles */
.bubble-row{display:flex;align-items:flex-end;gap:8px}
.bubble-row.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bot .avatar{background:#2d6a2d;color:#fff}
.user .avatar{background:#8b6914;color:#fff}
.bubble{max-width:75%;padding:9px 13px;border-radius:18px;font-size:.86rem;line-height:1.55;word-break:break-word;position:relative}
.bot .bubble{background:#fff;color:#2c2c2c;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.user .bubble{background:#2d6a2d;color:#fff;border-bottom-right-radius:4px}
.bubble-text{display:block;margin-bottom:4px}
.bubble img{max-width:100%;border-radius:10px;margin-bottom:6px;display:block}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:2px}
.time{font-size:.63rem;opacity:.5}
.speak-btn{
  background:none;border:none;cursor:pointer;
  font-size:13px;padding:2px 4px;border-radius:50%;
  opacity:.55;transition:all .2s;line-height:1
}
.speak-btn:hover{opacity:1;background:rgba(0,0,0,.06)}
.speak-btn.active{opacity:1;color:#2d6a2d;animation:blink .8s infinite}

/* Typing */
.typing-dots span{display:inline-block;width:7px;height:7px;background:#4a8c3f;border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* Image preview */
#image-preview-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:#e8e0cc;border-top:1px solid #d4c9b0;flex-shrink:0}
#image-preview-bar img{height:50px;width:50px;object-fit:cover;border-radius:8px;border:2px solid #4a8c3f}
#image-preview-bar span{font-size:.78rem;color:#5a4a2a;flex:1}
#remove-image{background:none;border:none;font-size:18px;cursor:pointer;color:#c0392b}

/* Voice overlay */
#voice-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(10,30,10,.88);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;gap:16px
}
#voice-overlay.show{display:flex}
.voice-ring{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,#2d6a2d,#4a8c3f);
  display:flex;align-items:center;justify-content:center;font-size:44px;
  cursor:pointer;transition:transform .15s;user-select:none
}
.voice-ring:active{transform:scale(.93)}
.voice-ring.listening{animation:ring 1s ease-in-out infinite}
.voice-ring.speaking{animation:speakpulse .6s ease-in-out infinite}
.voice-ring.waiting{animation:blink 1.2s infinite}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(74,140,63,.7)}70%{box-shadow:0 0 0 30px rgba(74,140,63,0)}}
@keyframes speakpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#voice-state-label{color:#fff;font-size:1.05rem;font-weight:700;letter-spacing:.4px}
#voice-hint{color:rgba(255,255,255,.55);font-size:.75rem;margin-top:-8px}
#voice-transcript-box{
  background:rgba(255,255,255,.1);border-radius:14px;
  padding:10px 20px;width:300px;text-align:center;
  color:rgba(255,255,255,.92);font-size:.85rem;min-height:46px;
  border:1px solid rgba(255,255,255,.15);line-height:1.5
}
#end-voice-btn{
  background:#c0392b;color:#fff;border:none;
  padding:11px 28px;border-radius:24px;font-size:.88rem;
  font-weight:600;cursor:pointer;margin-top:6px
}

/* Input bar */
.input-bar{display:flex;align-items:center;gap:7px;padding:9px 12px;background:#ede8dc;border-top:1px solid #d4c9b0;flex-shrink:0}
#user-input{flex:1;border:1.5px solid #c4b896;border-radius:24px;padding:9px 15px;font-size:.86rem;background:#fff;outline:none;color:#2c2c2c;transition:border .2s}
#user-input:focus{border-color:#4a8c3f}
#user-input::placeholder{color:#a89870}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0}
#img-btn{background:#e8e0cc;color:#5a4a2a}
#img-btn:hover{background:#d4c9b0}
#mic-btn{background:#e8e0cc;color:#5a4a2a}
#mic-btn.recording{background:#c0392b;color:#fff}
#send-btn{background:#2d6a2d;color:#fff}
#send-btn:hover{background:#4a8c3f}

.welcome-card{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;border-radius:16px;padding:16px;text-align:center}
.welcome-card h2{font-size:.95rem;margin-bottom:4px}
.welcome-card p{font-size:.76rem;opacity:.9;line-height:1.5}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
</style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div>
    <h1>Fahamu Shamba</h1>
    <p>Your Farming Advisor</p>
  </div>
  <div class="header-right">
    <button id="voice-mode-btn"><span class="vm-dot"></span> Voice Mode</button>
    <div class="status-dot"></div>
  </div>
</header>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('What is the best crop to plant in Kenya right now?')">🌾 Best Crop</button>
  <button class="qa-btn" onclick="quickAsk('Give me weather update and planting advice for Kenyan farmers')">☀️ Weather</button>
  <button class="qa-btn" onclick="quickAsk('What are common pests and diseases affecting crops in Kenya and how to treat them?')">🐛 Pest Tips</button>
  <button class="qa-btn" onclick="quickAsk('What are current market prices for crops in Kenya?')">📈 Market Prices</button>
  <button class="qa-btn" onclick="document.getElementById('file-input').click()">📷 Upload Crop Photo</button>
</div>

<div id="chat-window">
  <div class="welcome-card">
    <h2>🌱 Karibu! Welcome to Fahamu Shamba</h2>
    <p>Ask me about crops, weather, pests or markets.<br>
    📷 Upload a crop photo for pest/disease diagnosis.<br>
    🎤 Tap <strong>Voice Mode</strong> for a hands-free conversation!</p>
  </div>
</div>

<div id="image-preview-bar">
  <img id="preview-thumb" src="" alt="preview"/>
  <span id="preview-name">Image ready</span>
  <button id="remove-image">✕</button>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none"/>

<div class="input-bar">
  <button class="icon-btn" id="img-btn" title="Upload image">📷</button>
  <input type="text" id="user-input" placeholder="Ask about crops, weather, markets..."/>
  <button class="icon-btn" id="mic-btn" title="Hold to speak">🎤</button>
  <button class="icon-btn" id="send-btn">➤</button>
</div>

<!-- Voice conversation overlay -->
<div id="voice-overlay">
  <div class="voice-ring" id="voice-ring">🎤</div>
  <p id="voice-state-label">Listening...</p>
  <small id="voice-hint">Tap the circle to interrupt</small>
  <div id="voice-transcript-box">Speak now...</div>
  <button id="end-voice-btn">End Conversation</button>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const chatWindow       = document.getElementById('chat-window');
const userInput        = document.getElementById('user-input');
const sendBtn          = document.getElementById('send-btn');
const micBtn           = document.getElementById('mic-btn');
const imgBtn           = document.getElementById('img-btn');
const fileInput        = document.getElementById('file-input');
const previewBar       = document.getElementById('image-preview-bar');
const previewThumb     = document.getElementById('preview-thumb');
const previewName      = document.getElementById('preview-name');
const removeImageBtn   = document.getElementById('remove-image');
const voiceModeBtn     = document.getElementById('voice-mode-btn');
const voiceOverlay     = document.getElementById('voice-overlay');
const voiceRing        = document.getElementById('voice-ring');
const voiceStateLabel  = document.getElementById('voice-state-label');
const voiceTranscript  = document.getElementById('voice-transcript-box');
const endVoiceBtn      = document.getElementById('end-voice-btn');

// ── State ─────────────────────────────────────────────────────────────────────
let selectedFile   = null;
let voiceActive    = false;
// States: idle | listening | processing | speaking
let voiceState     = 'idle';
let recog          = null;
let activeSpeakBtn = null;

// ── Utils ─────────────────────────────────────────────────────────────────────
const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function addBubble(htmlText, role, imgUrl = null) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const imgTag = imgUrl ? `<img src="${imgUrl}" alt="crop"/>` : '';
  const speakBtnHtml = role === 'bot'
    ? `<button class="speak-btn" title="Read aloud" data-text="">🔊</button>`
    : '';
  row.innerHTML = `
    <div class="avatar">${role==='bot'?'🌾':'👨🌾'}</div>
    <div class="bubble">
      ${imgTag}
      <span class="bubble-text">${htmlText}</span>
      <div class="meta">
        ${speakBtnHtml}
        <span class="time">${now()}</span>
      </div>
    </div>`;
  // Store plain text on speak button for clean TTS
  if (role === 'bot') {
    const plain = htmlText.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'');
    row.querySelector('.speak-btn').dataset.text = plain;
    row.querySelector('.speak-btn').addEventListener('click', function(){ onSpeakBtn(this); });
  }
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return row;
}

function showTyping() {
  removeTyping();
  const row = document.createElement('div');
  row.id = 'typing-row';
  row.className = 'bubble-row bot';
  row.innerHTML = `<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function stopSpeaking() {
  window.speechSynthesis.cancel();
  if (activeSpeakBtn) { activeSpeakBtn.classList.remove('active'); activeSpeakBtn = null; }
}

function speak(text, onDone) {
  stopSpeaking();
  // Chrome bug: long utterances get cut — chunk by sentence
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  let i = 0;
  function next() {
    if (!voiceActive && onDone) { onDone(); return; }
    if (i >= sentences.length) { if (onDone) onDone(); return; }
    const utt = new SpeechSynthesisUtterance(sentences[i++].trim());
    utt.lang = 'en-US';
    utt.rate = 0.93;
    utt.onend = next;
    utt.onerror = next;
    window.speechSynthesis.speak(utt);
  }
  next();
}

function onSpeakBtn(btn) {
  if (btn.classList.contains('active')) {
    stopSpeaking();
    return;
  }
  stopSpeaking();
  activeSpeakBtn = btn;
  btn.classList.add('active');
  speak(btn.dataset.text, () => {
    btn.classList.remove('active');
    activeSpeakBtn = null;
  });
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function fetchReply(text, file) {
  if (file) {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('message', text || 'Identify any pest, disease, or crop condition in this image.');
    const r = await fetch('/analyze-image', {method:'POST', body: fd});
    return (await r.json()).reply;
  }
  const r = await fetch('/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message: text})
  });
  return (await r.json()).reply;
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage(text, file = null, autoSpeak = false) {
  text = (text || '').trim();
  if (!text && !file) return;

  const imgUrl = file ? URL.createObjectURL(file) : null;
  addBubble(text || '📷 Analyze this crop image.', 'user', imgUrl);
  userInput.value = '';
  clearImagePreview();
  showTyping();

  try {
    const reply = await fetchReply(text, file);
    removeTyping();
    addBubble(reply.replace(/\n/g,'<br>'), 'bot');
    if (autoSpeak && voiceActive) {
      speakReplyThenClose(reply);
    }
  } catch(e) {
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.', 'bot');
    if (voiceActive) setVoiceState('listening');
  }
}

function quickAsk(text) { sendMessage(text, null, false); }

sendBtn.addEventListener('click', () => sendMessage(userInput.value, selectedFile));
userInput.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(userInput.value, selectedFile); });

// ── Image upload ──────────────────────────────────────────────────────────────
function clearImagePreview() {
  selectedFile = null;
  previewBar.style.display = 'none';
  previewThumb.src = '';
  fileInput.value = '';
  userInput.placeholder = 'Ask about crops, weather, markets...';
}
function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  previewThumb.src = URL.createObjectURL(file);
  previewName.textContent = file.name;
  previewBar.style.display = 'flex';
  userInput.placeholder = 'Add a question about this image (optional)...';
  userInput.focus();
}
imgBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
removeImageBtn.addEventListener('click', clearImagePreview);
chatWindow.addEventListener('dragover', e => e.preventDefault());
chatWindow.addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

// ── Speech Recognition setup ──────────────────────────────────────────────────
const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;

// Laptop Chrome fix: unlock speechSynthesis on first interaction
document.addEventListener('click', () => {
  const u = new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
}, { once: true });

if (SRClass) {
  // Single-query mic button (makeRecog defined below in voice state section)
  micBtn.addEventListener('click', () => {
    if (voiceActive) return;
    if (micBtn.classList.contains('recording')) {
      if (recog) recog.stop();
      micBtn.classList.remove('recording');
    } else {
      recog = makeRecog();
      micBtn.classList.add('recording');
      try { recog.start(); } catch(e){ micBtn.classList.remove('recording'); }
    }
  });
} else {
  micBtn.disabled = true;
  micBtn.style.opacity = '.4';
  voiceModeBtn.disabled = true;
  voiceModeBtn.style.opacity = '.4';
  voiceModeBtn.title = 'Voice not supported in this browser';
}

// ── Voice state machine ───────────────────────────────────────────────────────
// States: idle | listening | processing | speaking | waiting
const voiceHint = document.getElementById('voice-hint');

function setVoiceState(state) {
  voiceState = state;
  voiceRing.className = 'voice-ring';
  if (state === 'listening') {
    voiceRing.textContent = '🎤';
    voiceRing.classList.add('listening');
    voiceStateLabel.textContent = 'Listening...';
    voiceTranscript.textContent = 'Speak now...';
    voiceHint.textContent = 'Tap circle to interrupt';
  } else if (state === 'processing') {
    voiceRing.textContent = '⏳';
    voiceStateLabel.textContent = 'Thinking...';
    voiceTranscript.textContent = '';
    voiceHint.textContent = '';
  } else if (state === 'speaking') {
    voiceRing.textContent = '🔊';
    voiceRing.classList.add('speaking');
    voiceStateLabel.textContent = 'Speaking...';
    voiceHint.textContent = 'Tap circle to interrupt';
  } else if (state === 'waiting') {
    voiceRing.textContent = '💬';
    voiceRing.classList.add('waiting');
    voiceStateLabel.textContent = 'Continue?';
    voiceHint.textContent = 'Say Yes / No  •  Ndio / Hapana';
  }
}

function startRecog() {
  if (!voiceActive || (voiceState !== 'listening' && voiceState !== 'waiting')) return;
  voiceTranscript.dataset.final = '';
  if (SRClass) recog = makeRecog();
  try { recog.start(); } catch(e) { setTimeout(startRecog, 800); }
}

// ── Interrupt: tap ring while speaking ───────────────────────────────────────
voiceRing.addEventListener('click', () => {
  if (!voiceActive) return;
  if (voiceState === 'speaking') {
    stopSpeaking();
    setVoiceState('listening');
    voiceTranscript.textContent = 'Go ahead, I am listening...';
    setTimeout(startRecog, 300);
  }
});

// ── Closing phrase + continue prompt ─────────────────────────────────────────
const CLOSINGS = [
  'Thank you for asking. Asante sana!',
  'Asante sana for your question!',
  'Thank you! Asante sana.'
];
const CONTINUE_PROMPT = 'Do you have another question? Say Yes to continue or No to end.';
const YES_WORDS = ['yes','yeah','yep','sure','okay','ok','ndio','ndiyo','endelea','continue'];
const NO_WORDS  = ['no','nope','hapana','stop','end','quit','exit','maliza','tosha'];

function speakClosingThenWait() {
  const closing = CLOSINGS[Math.floor(Math.random() * CLOSINGS.length)];
  const full = closing + ' ' + CONTINUE_PROMPT;
  setVoiceState('speaking');
  voiceTranscript.textContent = '';

  const sentences = full.match(/[^.!?]+[.!?]*/g) || [full];
  let i = 0;
  function next() {
    if (!voiceActive) return;
    if (i >= sentences.length) {
      // done speaking — go to waiting state
      setVoiceState('waiting');
      setTimeout(startRecog, 400);
      return;
    }
    const utt = new SpeechSynthesisUtterance(sentences[i++].trim());
    utt.lang = 'en-US'; utt.rate = 0.93;
    utt.onend = next; utt.onerror = next;
    window.speechSynthesis.speak(utt);
  }
  next();
}

// ── Updated makeRecog to handle waiting state ─────────────────────────────────
function makeRecog() {
  const r = new SRClass();
  r.lang = 'en-US';
  r.continuous = false;
  r.interimResults = true;
  r.onresult = e => {
    const transcript = Array.from(e.results).map(x => x[0].transcript).join('');
    voiceTranscript.textContent = `"${transcript}"`;
    if (!voiceActive) return;
    if (e.results[e.results.length-1].isFinal) {
      voiceTranscript.dataset.final = transcript;
    }
    // also fill text input for reference
    if (!voiceActive) userInput.value = transcript;
  };
  r.onend = () => {
    micBtn.classList.remove('recording');
    if (!voiceActive) return;
    const said = (voiceTranscript.dataset.final || '').trim().toLowerCase();
    voiceTranscript.dataset.final = '';

    if (voiceState === 'waiting') {
      // check yes/no
      const isYes = YES_WORDS.some(w => said.includes(w));
      const isNo  = NO_WORDS.some(w => said.includes(w));
      if (isNo) {
        sayGoodbye();
      } else {
        // yes or anything else — keep going
        setVoiceState('listening');
        setTimeout(startRecog, 300);
      }
      return;
    }

    if (said && voiceState === 'listening') {
      setVoiceState('processing');
      sendMessage(said, null, true);
    } else if (voiceState === 'listening') {
      setTimeout(startRecog, 500);
    }
  };
  r.onerror = e => {
    micBtn.classList.remove('recording');
    if (!voiceActive) return;
    if (e.error === 'no-speech') { setTimeout(startRecog, 400); }
    else if (e.error !== 'aborted') { setTimeout(startRecog, 1000); }
  };
  return r;
}

// ── Updated sendMessage speak callback ───────────────────────────────────────
// Override speak-after-reply to use closing phrase
function speakReplyThenClose(reply) {
  setVoiceState('speaking');
  const sentences = reply.match(/[^.!?]+[.!?]*/g) || [reply];
  let i = 0;
  function next() {
    if (!voiceActive) return;
    if (i >= sentences.length) {
      speakClosingThenWait();
      return;
    }
    // interrupt check — if state changed to listening, stop
    if (voiceState === 'listening') return;
    const utt = new SpeechSynthesisUtterance(sentences[i++].trim());
    utt.lang = 'en-US'; utt.rate = 0.93;
    utt.onend = next; utt.onerror = next;
    window.speechSynthesis.speak(utt);
  }
  next();
}

function sayGoodbye() {
  setVoiceState('speaking');
  voiceTranscript.textContent = '';
  const bye = new SpeechSynthesisUtterance(
    'Thank you for using Fahamu Shamba. Asante sana! Goodbye and happy farming!'
  );
  bye.lang = 'en-US'; bye.rate = 0.93;
  bye.onend = () => stopVoiceMode();
  bye.onerror = () => stopVoiceMode();
  window.speechSynthesis.speak(bye);
}

function startVoiceMode() {
  voiceActive = true;
  voiceModeBtn.classList.add('active');
  voiceModeBtn.innerHTML = '<span class="vm-dot"></span> End Voice';
  voiceOverlay.classList.add('show');
  stopSpeaking();
  setVoiceState('speaking');

  const greet = new SpeechSynthesisUtterance(
    'Hello! I am Fahamu Shamba, your farming advisor. How can I help you today?'
  );
  greet.lang = 'en-US'; greet.rate = 0.93;
  greet.onend = () => { if (voiceActive) { setVoiceState('listening'); startRecog(); } };
  greet.onerror = () => { if (voiceActive) { setVoiceState('listening'); startRecog(); } };
  window.speechSynthesis.speak(greet);
}

function stopVoiceMode() {
  voiceActive = false;
  voiceState = 'idle';
  voiceModeBtn.classList.remove('active');
  voiceModeBtn.innerHTML = '<span class="vm-dot"></span> Voice Mode';
  voiceOverlay.classList.remove('show');
  stopSpeaking();
  try { recog && recog.stop(); } catch(e) {}
}

voiceModeBtn.addEventListener('click', () => {
  if (!SRClass) return;
  voiceActive ? stopVoiceMode() : startVoiceMode();
});
endVoiceBtn.addEventListener('click', () => sayGoodbye());
</script>
</body>
</html>
