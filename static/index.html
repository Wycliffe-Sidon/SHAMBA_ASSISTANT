<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Fahamu Shamba AI - Intelligent AI-powered farming assistant providing personalized crop recommendations, weather insights, pest management, and market prices for African farmers."/>
<title>Fahamu Shamba AI - Smart Farming Assistant</title>
<style>
/* ── CSS VARIABLES ────────────────────────────────────────────────────────── */
:root {
  --primary-color: #2d6a2d;
  --primary-light: #4a8c3f;
  --accent-color: #10a37f;
  --accent-dark: #0d8c6c;
  --text-primary: #2c2c2c;
  --text-secondary: #6b6b6b;
  --bg-primary: #fff;
  --bg-secondary: #f7f7f8;
  --bg-light: #f9f9f9;
  --border-color: #e5e5e5;
  --success: #10a37f;
  --error: #ef4444;
  --warning: #f59e0b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(45,106,45,0.15);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.3);
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── RESET & BASE STYLES ─────────────────────────────────────────────────── */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  color: var(--text-primary);
}

/* ── HEADER ───────────────────────────────────────────────────────────────── */
header {
  background: var(--bg-primary);
  color: var(--text-primary);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  position: relative;
  z-index: 10;
}

.logo {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.2);
}

header .brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

header h1 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

header p {
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.status-text {
  font-size: 0.7rem;
  color: var(--success);
  font-weight: 600;
}

/* ── TAB NAVIGATION ───────────────────────────────────────────────────────── */
.tab-nav {
  display: flex;
  gap: 0;
  padding: 0;
  background: var(--bg-primary);
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
}

.tab-nav::-webkit-scrollbar {
  height: 4px;
}

.tab-nav::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 2px;
}

.tab-btn {
  white-space: nowrap;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-secondary);
  padding: 12px 16px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(45, 106, 45, 0.05);
}

.tab-btn.active {
  color: var(--primary-color);
  border-bottom-color: var(--primary-color);
  background: rgba(45, 106, 45, 0.08);
}

/* ── LOCATION BAR ─────────────────────────────────────────────────────────── */
.location-bar {
  background: var(--bg-light);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.location-icon {
  font-size: 16px;
}

.location-text {
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex: 1;
}

.location-text span {
  color: var(--text-primary);
  font-weight: 600;
}

.location-edit {
  font-size: 0.75rem;
  color: var(--accent-color);
  background: transparent;
  border: 1.5px solid var(--accent-color);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: var(--transition);
}

.location-edit:hover {
  background: var(--accent-color);
  color: var(--bg-primary);
}

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}

.modal.show {
  display: flex;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.modal-content {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
}

.modal-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border-color);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: inherit;
  background: var(--bg-secondary);
  color: var(--text-primary);
  transition: var(--transition);
}

.form-select:hover {
  border-color: var(--primary-color);
}

.form-select:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(45, 106, 45, 0.1);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-cancel {
  background: var(--bg-light);
  color: var(--text-secondary);
  border: 1px solid var(--border-color);
}

.btn-cancel:hover {
  background: var(--border-color);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(45, 106, 45, 0.4);
}

/* ── CHAT WINDOW ──────────────────────────────────────────────────────────── */
#chat-window {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg-primary);
}

#chat-window::-webkit-scrollbar {
  width: 6px;
}

#chat-window::-webkit-scrollbar-track {
  background: transparent;
}

#chat-window::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

#chat-window::-webkit-scrollbar-thumb:hover {
  background: var(--text-secondary);
}

/* ── MESSAGE BUBBLES ──────────────────────────────────────────────────────── */
.bubble-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  max-width: 100%;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.bubble-row.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.bot .avatar {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(45, 106, 45, 0.2);
}

.user .avatar {
  background: linear-gradient(135deg, #5436da, #7c3aed);
  color: var(--bg-primary);
}

.bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.6;
  word-break: break-word;
  box-shadow: var(--shadow-sm);
}

.bot .bubble {
  background: var(--bg-light);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.user .bubble {
  background: linear-gradient(135deg, #5436da, #7c3aed);
  color: var(--bg-primary);
  border-bottom-right-radius: 4px;
}

.bubble-text {
  display: block;
}

.bubble img {
  max-width: 100%;
  border-radius: 10px;
  margin-bottom: 8px;
  display: block;
}

.meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 6px;
}

.time {
  font-size: 0.7rem;
  opacity: 0.6;
}

.speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 3px 4px;
  opacity: 0.5;
  transition: var(--transition);
}

.speak-btn:hover {
  opacity: 0.8;
}

.speak-btn.active {
  opacity: 1;
  animation: blink 0.8s infinite;
}

/* ── CROP RECOMMENDATION CARDS ────────────────────────────────────────────── */
.crop-card {
  background: var(--bg-primary);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 16px;
  margin: 8px 0;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.crop-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--primary-color);
  transform: translateY(-3px);
}

.crop-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(180deg, var(--primary-color), var(--primary-light));
}

.crop-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.crop-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.crop-score {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  box-shadow: 0 2px 6px rgba(45, 106, 45, 0.3);
}

.crop-details {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-top: 10px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg-light);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── TYPING INDICATOR ─────────────────────────────────────────────────────── */
.typing-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--primary-light);
  border-radius: 50%;
  margin: 0 3px;
  animation: bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.4s;
}

/* ── INPUT BAR ────────────────────────────────────────────────────────────── */
.input-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  background: var(--bg-primary);
  border-top: 2px solid var(--border-color);
  flex-shrink: 0;
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.02);
}

#user-input {
  flex: 1;
  border: 1.5px solid var(--border-color);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 0.9rem;
  background: var(--bg-secondary);
  outline: none;
  color: var(--text-primary);
  transition: var(--transition);
  resize: none;
  max-height: 100px;
}

#user-input:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(45, 106, 45, 0.1);
  background: var(--bg-primary);
}

#user-input::placeholder {
  color: var(--text-secondary);
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: var(--transition);
  flex-shrink: 0;
  background: var(--bg-light);
  color: var(--text-secondary);
}

.icon-btn:hover {
  background: var(--border-color);
  transform: scale(1.05);
}

.icon-btn:active {
  transform: scale(0.95);
}

#send-btn {
  background: linear-gradient(135deg, var(--accent-color), var(--accent-dark));
  color: var(--bg-primary);
  box-shadow: 0 2px 8px rgba(16, 163, 127, 0.3);
}

#send-btn:hover {
  transform: scale(1.05);
}

#send-btn:disabled {
  background: var(--border-color);
  cursor: not-allowed;
  opacity: 0.5;
}

#mic-btn.recording {
  background: var(--error);
  color: var(--bg-primary);
  animation: pulse 1s infinite;
}

/* ── WELCOME CARD ─────────────────────────────────────────────────────────── */
.welcome-card {
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: var(--bg-primary);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  box-shadow: var(--shadow-md);
  margin: 16px 0;
}

.welcome-card h2 {
  font-size: 1.3rem;
  margin-bottom: 12px;
  font-weight: 700;
}

.welcome-card p {
  font-size: 0.9rem;
  opacity: 0.95;
  line-height: 1.7;
}

/* ── SECTION HEADERS ──────────────────────────────────────────────────────── */
.section-header {
  background: linear-gradient(135deg, #f0f8f0, #e8f5e8);
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 16px;
  border-left: 4px solid var(--primary-color);
  box-shadow: var(--shadow-sm);
}

.section-header h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary-color);
  margin-bottom: 6px;
}

.section-header p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ── INFO CARDS ───────────────────────────────────────────────────────────── */
.info-card {
  background: var(--bg-light);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px;
  margin: 10px 0;
  transition: var(--transition);
}

.info-card:hover {
  box-shadow: var(--shadow-sm);
  border-color: var(--accent-color);
}

.info-card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-card-content {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.price-tag {
  background: var(--primary-color);
  color: var(--bg-primary);
  padding: 4px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 0.85rem;
  display: inline-block;
}

.trend-up {
  color: var(--success);
  font-weight: 700;
}

.trend-down {
  color: var(--error);
  font-weight: 700;
}

.trend-stable {
  color: var(--text-secondary);
  font-weight: 700;
}

/* ── ANIMATIONS ───────────────────────────────────────────────────────────── */
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── RESPONSIVE DESIGN ────────────────────────────────────────────────────── */
@media (min-width: 768px) {
  header {
    padding: 14px 20px;
  }
  .logo {
    width: 44px;
    height: 44px;
    font-size: 22px;
  }
  header h1 {
    font-size: 1.1rem;
  }
  header p {
    font-size: 0.75rem;
  }
  .tab-btn {
    padding: 14px 20px;
    font-size: 0.9rem;
  }
  #chat-window {
    padding: 20px;
  }
  .bubble {
    font-size: 0.92rem;
    padding: 12px 16px;
  }
  .avatar {
    width: 40px;
    height: 40px;
    font-size: 20px;
  }
  .input-bar {
    padding: 12px 20px;
    gap: 12px;
  }
  #user-input {
    padding: 11px 16px;
    font-size: 0.92rem;
  }
  .icon-btn {
    width: 42px;
    height: 42px;
  }
  .crop-card {
    padding: 18px;
    border-radius: 16px;
  }
  .section-header {
    padding: 20px;
  }
  .modal-content {
    max-width: 420px;
  }
}

@media (min-width: 1024px) {
  header {
    padding: 16px 24px;
  }
  .logo {
    width: 48px;
    height: 48px;
    font-size: 24px;
  }
  header h1 {
    font-size: 1.15rem;
  }
  .tab-btn {
    padding: 16px 24px;
    font-size: 0.95rem;
  }
  #chat-window {
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  .bubble {
    font-size: 0.95rem;
  }
  .avatar {
    width: 44px;
    height: 44px;
    font-size: 22px;
  }
  .input-bar {
    padding: 14px 24px;
  }
  #user-input {
    padding: 12px 16px;
    font-size: 0.95rem;
  }
  .icon-btn {
    width: 44px;
    height: 44px;
    font-size: 20px;
  }
  .crop-card {
    padding: 20px;
  }
  .section-header {
    padding: 24px;
    border-radius: 14px;
    margin-bottom: 20px;
  }
  .welcome-card {
    padding: 32px;
    margin: 24px auto;
    max-width: 500px;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div class="brand">
    <h1>Fahamu Shamba AI</h1>
    <p>Smart Farming Assistant</p>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-text">Online</span>
    </div>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="crops" onclick="switchTab('crops')">🌾 Crop Recommendations</button>
  <button class="tab-btn" data-tab="weather" onclick="switchTab('weather')">☀️ Weather</button>
  <button class="tab-btn" data-tab="pests" onclick="switchTab('pests')">🐛 Pest & Diseases</button>
  <button class="tab-btn" data-tab="market" onclick="switchTab('market')">📈 Market Prices</button>
  <button class="tab-btn" data-tab="general" onclick="switchTab('general')">💬 General Questions</button>
</div>

<div class="location-bar">
  <span class="location-icon">📍</span>
  <div class="location-text">Location: <span id="locationDisplay">Not set</span></div>
  <button class="location-edit" onclick="openLocationModal()">Change</button>
</div>

<div id="chat-window">
  <!-- Content will be dynamically loaded based on active tab -->
</div>

<div class="input-bar">
  <input type="text" id="user-input" placeholder="Ask me anything about farming... / Uliza kuhusu kilimo..."/>
  <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
  <button class="icon-btn" id="send-btn">➤</button>
</div>

<div class="modal" id="locationModal">
  <div class="modal-content">
    <div class="modal-title">📍 Set Your Location</div>
    <div class="form-group">
      <label class="form-label">County</label>
      <select class="form-select" id="countySelect">
        <option value="">Select County</option>
        <option value="Nairobi">Nairobi</option>
        <option value="Kiambu">Kiambu</option>
        <option value="Nakuru">Nakuru</option>
        <option value="Kisumu">Kisumu</option>
        <option value="Siaya">Siaya</option>
        <option value="Kakamega">Kakamega</option>
        <option value="Bungoma">Bungoma</option>
        <option value="Meru">Meru</option>
        <option value="Embu">Embu</option>
        <option value="Machakos">Machakos</option>
        <option value="Kitui">Kitui</option>
        <option value="Nyeri">Nyeri</option>
        <option value="Murang'a">Murang'a</option>
        <option value="Kirinyaga">Kirinyaga</option>
        <option value="Uasin Gishu">Uasin Gishu</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Sub-location</label>
      <select class="form-select" id="sublocationSelect" disabled>
        <option value="">Select county first</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeLocationModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLocation()">Save Location</button>
    </div>
  </div>
</div>

<script>
const chatWindow=document.getElementById('chat-window');
const userInput=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const micBtn=document.getElementById('mic-btn');

let activeSpeakBtn=null;
let userLocation={county:'',sublocation:''};
let currentSessionId='session_'+Date.now();
let isSpeaking=false;
let currentUtterance=null;
let currentTab='crops';

const countySublocations={
  'Nairobi':['Westlands','Dagoretti','Langata','Kibra','Roysambu','Kasarani','Ruaraka','Embakasi','Makadara','Kamukunji','Starehe','Mathare'],
  'Kiambu':['Limuru','Kikuyu','Kabete','Githunguri','Kiambaa','Ruiru','Juja','Thika','Gatundu','Lari'],
  'Nakuru':['Nakuru Town','Naivasha','Gilgil','Molo','Njoro','Rongai','Subukia','Bahati','Kuresoi'],
  'Kisumu':['Kisumu Central','Kisumu East','Kisumu West','Seme','Nyando','Muhoroni','Nyakach'],
  'Siaya':['Bondo','Rarieda','Ugenya','Ugunja','Gem','Alego Usonga'],
  'Kakamega':['Kakamega Town','Mumias','Butere','Khwisero','Shinyalu','Lurambi','Ikolomani','Lugari','Malava','Matungu','Navakholo'],
  'Bungoma':['Bungoma Town','Webuye','Kimilili','Bumula','Kanduyi','Sirisia','Kabuchai','Tongaren','Mt. Elgon'],
  'Meru':['Meru Town','Imenti North','Imenti South','Imenti Central','Tigania East','Tigania West','Igembe North','Igembe South','Igembe Central'],
  'Embu':['Embu Town','Manyatta','Runyenjes','Mbeere North','Mbeere South'],
  'Machakos':['Machakos Town','Kangundo','Matungulu','Kathiani','Mavoko','Yatta','Masinga','Mwala'],
  'Kitui':['Kitui Town','Mwingi','Kitui Central','Kitui West','Kitui East','Kitui South','Mwingi North','Mwingi Central'],
  'Nyeri':['Nyeri Town','Othaya','Tetu','Kieni','Mathira','Mukurweini'],
  "Murang'a":['Murang\'a Town','Kangema','Kiharu','Kigumo','Maragwa','Kandara','Gatanga'],
  'Kirinyaga':['Kerugoya','Kutus','Gichugu','Ndia','Kirinyaga Central','Mwea'],
  'Uasin Gishu':['Eldoret','Ainabkoi','Kapseret','Kesses','Moiben','Soy','Turbo']
};

const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function addBubble(htmlText,role,lang='en'){
  const row=document.createElement('div');
  row.className=`bubble-row ${role}`;
  const speakBtnHtml=role==='bot'?`<button class="speak-btn" title="Read aloud" data-text="" data-lang="${lang}">🔊</button>`:'';
  row.innerHTML=`
    <div class="avatar">${role==='bot'?'🌾':'👨🌾'}</div>
    <div class="bubble">
      <span class="bubble-text">${htmlText}</span>
      <div class="meta">
        ${speakBtnHtml}
        <span class="time">${now()}</span>
      </div>
    </div>`;
  if(role==='bot'){
    const plain=htmlText.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'');
    const speakBtn=row.querySelector('.speak-btn');
    speakBtn.dataset.text=plain;
    speakBtn.addEventListener('click',function(){onSpeakBtn(this);});
  }
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
  return row;
}

function showTyping(){
  removeTyping();
  const row=document.createElement('div');
  row.id='typing-row';
  row.className='bubble-row bot';
  row.innerHTML=`<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}
function removeTyping(){
  const t=document.getElementById('typing-row');
  if(t)t.remove();
}

function stopSpeaking(){
  window.speechSynthesis.cancel();
  isSpeaking=false;
  currentUtterance=null;
  if(activeSpeakBtn){activeSpeakBtn.classList.remove('active');activeSpeakBtn=null;}
}

function speak(text,onDone,lang='en-US'){
  stopSpeaking();
  isSpeaking=true;
  const sentences=text.match(/[^.!?]+[.!?]*/g)||[text];
  let i=0;
  function next(){
    if(i>=sentences.length||!isSpeaking){
      isSpeaking=false;
      if(onDone)onDone();
      return;
    }
    currentUtterance=new SpeechSynthesisUtterance(sentences[i++].trim());
    currentUtterance.lang=lang;
    currentUtterance.rate=0.93;
    currentUtterance.onend=next;
    currentUtterance.onerror=next;
    window.speechSynthesis.speak(currentUtterance);
  }
  next();
}

function onSpeakBtn(btn){
  if(btn.classList.contains('active')){
    stopSpeaking();
    return;
  }
  stopSpeaking();
  activeSpeakBtn=btn;
  btn.classList.add('active');
  const lang=btn.dataset.lang==='sw'?'sw-KE':'en-US';
  speak(btn.dataset.text,()=>{
    btn.classList.remove('active');
    activeSpeakBtn=null;
  },lang);
}

async function fetchReply(text){
  const wasInterrupted=isSpeaking;
  if(isSpeaking){
    stopSpeaking();
  }
  
  const r=await fetch('/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:text,
      session_id:currentSessionId,
      county:userLocation.county,
      sublocation:userLocation.sublocation,
      interrupted:wasInterrupted,
      context:currentTab
    })
  });
  const data=await r.json();
  return data;
}

async function sendMessage(text){
  text=(text||'').trim();
  if(!text)return;

  addBubble(text,'user');
  userInput.value='';
  showTyping();

  try{
    const data=await fetchReply(text);
    removeTyping();
    
    const detectedLang=data.language||'en';
    
    if(data.recommendations){
      // Display conversational response with crop cards
      let responseHtml=data.reply.replace(/\n/g,'<br>');
      addBubble(responseHtml,'bot',detectedLang);
      
      // Add crop recommendation cards with percentage
      const cardsHtml=data.recommendations.map((crop,idx)=>{
        const icons=['🥇','🥈','🥉'];
        const percentage=crop.score;
        return `
          <div class="crop-card">
            <div class="crop-header">
              <div class="crop-name">${icons[idx]} ${crop.name}</div>
              <div class="crop-score">${percentage}%</div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${percentage}%"></div>
            </div>
            <div class="crop-details">${crop.detail}</div>
          </div>
        `;
      }).join('');
      
      addBubble(cardsHtml,'bot',detectedLang);
    }else{
      // Regular text response
      const reply=typeof data==='string'?data:data.reply;
      addBubble(reply.replace(/\n/g,'<br>'),'bot',detectedLang);
    }
  }catch(e){
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.<br>Samahani, sikuweza kuunganisha. Tafadhali jaribu tena.','bot');
  }
}

sendBtn.addEventListener('click',()=>sendMessage(userInput.value));
userInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage(userInput.value);});



const SRClass=window.SpeechRecognition||window.webkitSpeechRecognition;
document.addEventListener('click',()=>{
  const u=new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
},{once:true});

if(SRClass){
  let recog=null;
  micBtn.addEventListener('click',()=>{
    if(micBtn.classList.contains('recording')){
      if(recog)recog.stop();
      micBtn.classList.remove('recording');
    }else{
      recog=new SRClass();
      recog.lang='en-US';
      recog.continuous=false;
      recog.interimResults=true;
      recog.onresult=e=>{
        userInput.value=Array.from(e.results).map(r=>r[0].transcript).join('');
      };
      recog.onend=()=>micBtn.classList.remove('recording');
      recog.onerror=()=>micBtn.classList.remove('recording');
      micBtn.classList.add('recording');
      try{recog.start();}catch(e){micBtn.classList.remove('recording');}
    }
  });
}else{
  micBtn.disabled=true;
  micBtn.style.opacity='.4';
}

function openLocationModal(){
  document.getElementById('locationModal').classList.add('show');
}

function closeLocationModal(){
  document.getElementById('locationModal').classList.remove('show');
}

document.getElementById('countySelect').addEventListener('change',function(){
  const county=this.value;
  const sublocationSelect=document.getElementById('sublocationSelect');
  
  if(county&&countySublocations[county]){
    sublocationSelect.disabled=false;
    sublocationSelect.innerHTML='<option value="">Select sub-location</option>';
    
    countySublocations[county].forEach(subloc=>{
      const option=document.createElement('option');
      option.value=subloc;
      option.textContent=subloc;
      sublocationSelect.appendChild(option);
    });
  }else{
    sublocationSelect.disabled=true;
    sublocationSelect.innerHTML='<option value="">Select county first</option>';
  }
});

function saveLocation(){
  const county=document.getElementById('countySelect').value;
  const sublocation=document.getElementById('sublocationSelect').value;
  
  if(!county){
    alert('Please select a county / Chagua kaunti');
    return;
  }
  
  if(!sublocation){
    alert('Please select a sub-location / Chagua eneo');
    return;
  }
  
  userLocation={county,sublocation};
  const displayText=`${sublocation}, ${county}`;
  document.getElementById('locationDisplay').textContent=displayText;
  closeLocationModal();
  
  // Load the current tab content
  loadTabContent(currentTab);
}

// Tab switching functionality
function switchTab(tabName){
  currentTab=tabName;
  
  // Update active tab button
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.remove('active');
    if(btn.dataset.tab===tabName){
      btn.classList.add('active');
    }
  });
  
  // Load tab content
  loadTabContent(tabName);
}

function loadTabContent(tabName){
  chatWindow.innerHTML='';
  
  if(!userLocation.county){
    chatWindow.innerHTML=`
      <div class="welcome-card">
        <h2>🌱 Welcome to Fahamu Shamba AI</h2>
        <p>Please set your location first to get personalized farming advice!</p>
        <p style="margin-top:8px;font-size:0.8rem;">Tafadhali weka eneo lako kwanza kupata ushauri wa kilimo!</p>
      </div>
    `;
    return;
  }
  
  switch(tabName){
    case 'crops':
      loadCropRecommendations();
      break;
    case 'weather':
      loadWeatherInfo();
      break;
    case 'pests':
      loadPestInfo();
      break;
    case 'market':
      loadMarketPrices();
      break;
    case 'general':
      loadGeneralQuestions();
      break;
  }
}

async function loadCropRecommendations(){
  chatWindow.innerHTML=`
    <div class="section-header">
      <h3>🌾 Top 3 Crop Recommendations for ${userLocation.sublocation}, ${userLocation.county}</h3>
      <p>Based on your soil type, current season, weather patterns, and market demand</p>
    </div>
  `;
  
  showTyping();
  
  const query=`I'm a farmer in ${userLocation.sublocation}, ${userLocation.county}. Give me the top 3 best crops to plant right now with detailed recommendations.`;
  
  try{
    const data=await fetchReply(query);
    removeTyping();
    
    if(data.recommendations){
      let responseHtml=data.reply.replace(/\n/g,'<br>');
      addBubble(responseHtml,'bot',data.language||'en');
      
      const cardsHtml=data.recommendations.map((crop,idx)=>{
        const icons=['🥇','🥈','🥉'];
        const percentage=crop.score;
        return `
          <div class="crop-card">
            <div class="crop-header">
              <div class="crop-name">${icons[idx]} ${crop.name}</div>
              <div class="crop-score">${percentage}%</div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${percentage}%"></div>
            </div>
            <div class="crop-details">${crop.detail}</div>
          </div>
        `;
      }).join('');
      
      addBubble(cardsHtml,'bot',data.language||'en');
    }
  }catch(e){
    removeTyping();
    addBubble('Error loading recommendations. Please try again.','bot');
  }
}

async function loadWeatherInfo(){
  chatWindow.innerHTML=`
    <div class="section-header">
      <h3>☀️ Weather Information for ${userLocation.sublocation}, ${userLocation.county}</h3>
      <p>Current season, rainfall patterns, and farming advice</p>
    </div>
  `;
  
  showTyping();
  
  const query=`Give me detailed weather information and seasonal advice for farming in ${userLocation.sublocation}, ${userLocation.county}. Include current season, expected rainfall, temperature, and what farmers should do now.`;
  
  try{
    const data=await fetchReply(query);
    removeTyping();
    const reply=typeof data==='string'?data:data.reply;
    addBubble(reply.replace(/\n/g,'<br>'),'bot',data.language||'en');
  }catch(e){
    removeTyping();
    addBubble('Error loading weather information. Please try again.','bot');
  }
}

    <div class="section-header">

    </div>

function loadGeneralQuestions(){
  chatWindow.innerHTML=`
    <div class="section-header">
      <h3>💬 General Agricultural Questions</h3>
      <p>Ask me anything about farming, crops, soil, irrigation, fertilizers, and more!</p>
    </div>
    <div class="welcome-card">
      <h2>🌱 How can I help you today?</h2>
      <p>Ask me questions about:</p>
      <p style="margin-top:12px;text-align:left;">
        • Soil preparation and management<br>
        • Fertilizer recommendations<br>
        • Irrigation techniques<br>
        • Crop rotation strategies<br>
        • Harvesting and storage tips<br>
        • Organic farming methods<br>
        • And much more!
      </p>
    </div>
  `;
  
  userInput.placeholder='Ask me anything about farming...';

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    if(!userLocation.county){
      openLocationModal();
    }else{
      loadTabContent(currentTab);
    }
  },500);
});
</script>
