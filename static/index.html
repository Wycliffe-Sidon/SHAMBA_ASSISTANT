<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Fahamu Shamba - AI Farming Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f7f7f8;display:flex;flex-direction:column}

/* Header */
header{background:#fff;color:#2c2c2c;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #e5e5e5;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#2d6a2d,#4a8c3f);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff}
header h1{font-size:0.95rem;font-weight:600;color:#2c2c2c}
header p{font-size:0.7rem;color:#6b6b6b}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-dot{width:8px;height:8px;background:#10a37f;border-radius:50%;animation:pulse 2s infinite}

/* Tab Navigation */
.tab-nav{display:flex;gap:0;padding:0;background:#fff;overflow-x:auto;flex-shrink:0;border-bottom:2px solid #e5e5e5}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{white-space:nowrap;background:transparent;border:none;border-bottom:3px solid transparent;color:#6b6b6b;padding:12px 16px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:#2c2c2c;background:#f7f7f8}
.tab-btn.active{color:#2d6a2d;border-bottom-color:#2d6a2d;background:#f0f8f0}

/* Location bar */
.location-bar{background:#f9f9f9;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.location-icon{font-size:13px}
.location-text{font-size:0.75rem;color:#6b6b6b;flex:1}
.location-text span{color:#2c2c2c;font-weight:600}
.location-edit{font-size:0.72rem;color:#10a37f;background:none;border:1px solid #10a37f;border-radius:5px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s}
.location-edit:hover{background:#10a37f;color:#fff}

/* Location modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.modal-title{font-size:0.95rem;font-weight:600;color:#2c2c2c;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-label{font-size:0.75rem;color:#6b5a3e;margin-bottom:5px;display:block;font-weight:500}
.form-select{width:100%;padding:8px 11px;border:1px solid #c8b99a;border-radius:8px;font-size:0.8rem;font-family:inherit;background:#f5f0e8;color:#2c2c2c}
.form-select:focus{outline:none;border-color:#2d6a2d}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-cancel{background:#d4c4a0;color:#6b5a3e}
.btn-cancel:hover{background:#c8b99a}
.btn-primary{background:#2d6a2d;color:#fff}
.btn-primary:hover{background:#3d8a28}

/* Chat */
#chat-window{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff}
#chat-window::-webkit-scrollbar{width:6px}
#chat-window::-webkit-scrollbar-thumb{background:#d9d9d9;border-radius:3px}
#chat-window::-webkit-scrollbar-thumb:hover{background:#b3b3b3}

/* Bubbles */
.bubble-row{display:flex;align-items:flex-start;gap:10px;max-width:100%}
.bubble-row.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bot .avatar{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff}
.user .avatar{background:#5436da;color:#fff}
.bubble{max-width:85%;padding:10px 14px;border-radius:18px;font-size:0.9rem;line-height:1.6;word-break:break-word}
.bot .bubble{background:#f7f7f8;color:#2c2c2c;border-bottom-left-radius:4px}
.user .bubble{background:#5436da;color:#fff;border-bottom-right-radius:4px}
.bubble-text{display:block}
.bubble img{max-width:100%;border-radius:10px;margin-bottom:8px;display:block}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:4px}
.time{font-size:0.65rem;opacity:0.6}
.speak-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 4px;opacity:0.5;transition:opacity .2s}
.speak-btn:hover{opacity:1}
.speak-btn.active{opacity:1;animation:blink .8s infinite}

/* Crop recommendation cards */
.crop-card{background:#fff;border:2px solid #e5e5e5;border-radius:12px;padding:16px;margin:10px 0;transition:all .3s;position:relative;overflow:hidden}
.crop-card:hover{box-shadow:0 4px 12px rgba(45,106,45,0.15);border-color:#2d6a2d;transform:translateY(-2px)}
.crop-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:linear-gradient(180deg,#2d6a2d,#4a8c3f)}
.crop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.crop-name{font-size:1rem;font-weight:700;color:#2c2c2c;display:flex;align-items:center;gap:8px}
.crop-score{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;padding:6px 14px;border-radius:20px;font-size:0.85rem;font-weight:700;box-shadow:0 2px 6px rgba(45,106,45,0.3)}
.crop-details{font-size:0.85rem;color:#6b6b6b;line-height:1.6;margin-top:8px}
.crop-icon{font-size:28px}
.progress-bar{width:100%;height:8px;background:#e5e5e5;border-radius:10px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d6a2d,#4a8c3f);border-radius:10px;transition:width .5s ease}

/* Typing */
.typing-dots span{display:inline-block;width:6px;height:6px;background:#4a8c3f;border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* Input bar */
.input-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid #e5e5e5;flex-shrink:0}
#user-input{flex:1;border:1px solid #d9d9d9;border-radius:8px;padding:10px 14px;font-size:0.9rem;background:#fff;outline:none;color:#2c2c2c;transition:border-color .15s}
#user-input:focus{border-color:#10a37f;box-shadow:0 0 0 3px rgba(16,163,127,0.1)}
#user-input::placeholder{color:#999}
.icon-btn{width:38px;height:38px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0}
#img-btn{background:#f7f7f8;color:#6b6b6b}
#img-btn:hover{background:#ececec}
#mic-btn{background:#f7f7f8;color:#6b6b6b}
#mic-btn.recording{background:#ef4444;color:#fff}
#send-btn{background:#10a37f;color:#fff}
#send-btn:hover{background:#0d8c6c}
#send-btn:disabled{background:#d9d9d9;cursor:not-allowed}

.welcome-card{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.welcome-card h2{font-size:1.1rem;margin-bottom:8px;font-weight:600}
.welcome-card p{font-size:0.85rem;opacity:0.95;line-height:1.6}

/* Section-specific styles */
.section-header{background:linear-gradient(135deg,#f0f8f0,#e8f5e8);padding:16px;border-radius:10px;margin-bottom:16px;border-left:4px solid #2d6a2d}
.section-header h3{font-size:1.05rem;font-weight:700;color:#2d6a2d;margin-bottom:4px}
.section-header p{font-size:0.8rem;color:#6b6b6b;line-height:1.5}
.info-card{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin:8px 0}
.info-card-title{font-size:0.9rem;font-weight:600;color:#2c2c2c;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.info-card-content{font-size:0.85rem;color:#6b6b6b;line-height:1.6}
.price-tag{background:#2d6a2d;color:#fff;padding:4px 10px;border-radius:6px;font-weight:600;font-size:0.85rem;display:inline-block}
.trend-up{color:#10a37f;font-weight:600}
.trend-down{color:#ef4444;font-weight:600}
.trend-stable{color:#6b6b6b;font-weight:600}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* Tablet */
@media (min-width:768px){
  header{padding:12px 16px}
  .logo{width:40px;height:40px;font-size:20px}
  header h1{font-size:1rem}
  header p{font-size:0.72rem}
  .tab-nav{padding:0}
  .tab-btn{padding:12px 18px;font-size:0.82rem}
  #chat-window{padding:14px}
  .bubble{font-size:0.85rem;padding:9px 12px}
  .avatar{width:30px;height:30px}
  .input-bar{padding:9px 12px;gap:7px}
  #user-input{padding:9px 14px;font-size:0.85rem}
  .icon-btn{width:38px;height:38px;font-size:17px}
  .crop-card{padding:18px}
  .section-header{padding:18px}
}

/* Desktop */
@media (min-width:1024px){
  header{padding:14px 18px}
  .logo{width:42px;height:42px;font-size:22px}
  header h1{font-size:1.05rem}
  header p{font-size:0.75rem}
  .tab-nav{padding:0}
  .tab-btn{padding:14px 20px;font-size:0.85rem}
  #chat-window{padding:16px}
  .bubble{font-size:0.88rem;padding:10px 13px}
  .avatar{width:32px;height:32px;font-size:15px}
  .input-bar{padding:10px 14px;gap:8px}
  #user-input{padding:10px 15px;font-size:0.88rem}
  .icon-btn{width:40px;height:40px;font-size:18px}
  .crop-card{padding:20px}
  .section-header{padding:20px}
}
</style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div>
    <h1>Fahamu Shamba AI</h1>
    <p>Intelligent Farming Assistant</p>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="crops" onclick="switchTab('crops')">🌾 Crop Recommendations</button>
  <button class="tab-btn" data-tab="weather" onclick="switchTab('weather')">☀️ Weather</button>
  <button class="tab-btn" data-tab="pests" onclick="switchTab('pests')">🐛 Pest & Diseases</button>
  <button class="tab-btn" data-tab="market" onclick="switchTab('market')">📈 Market Prices</button>
  <button class="tab-btn" data-tab="general" onclick="switchTab('general')">💬 General Questions</button>
</div>

<div class="location-bar">
  <span class="location-icon">📍</span>
  <div class="location-text">Location: <span id="locationDisplay">Not set</span></div>
  <button class="location-edit" onclick="openLocationModal()">Change</button>
</div>

<div id="chat-window">
  <!-- Content will be dynamically loaded based on active tab -->
</div>

<div class="input-bar">
  <input type="text" id="user-input" placeholder="Ask me anything about farming... / Uliza kuhusu kilimo..."/>
  <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
  <button class="icon-btn" id="send-btn">➤</button>
</div>

<div class="modal" id="locationModal">
  <div class="modal-content">
    <div class="modal-title">📍 Set Your Location</div>
    <div class="form-group">
      <label class="form-label">County</label>
      <select class="form-select" id="countySelect">
        <option value="">Select County</option>
        <option value="Nairobi">Nairobi</option>
        <option value="Kiambu">Kiambu</option>
        <option value="Nakuru">Nakuru</option>
        <option value="Kisumu">Kisumu</option>
        <option value="Siaya">Siaya</option>
        <option value="Kakamega">Kakamega</option>
        <option value="Bungoma">Bungoma</option>
        <option value="Meru">Meru</option>
        <option value="Embu">Embu</option>
        <option value="Machakos">Machakos</option>
        <option value="Kitui">Kitui</option>
        <option value="Nyeri">Nyeri</option>
        <option value="Murang'a">Murang'a</option>
        <option value="Kirinyaga">Kirinyaga</option>
        <option value="Uasin Gishu">Uasin Gishu</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Sub-location</label>
      <select class="form-select" id="sublocationSelect" disabled>
        <option value="">Select county first</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeLocationModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLocation()">Save Location</button>
    </div>
  </div>
</div>

<script>
const chatWindow=document.getElementById('chat-window');
const userInput=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const micBtn=document.getElementById('mic-btn');

let activeSpeakBtn=null;
let userLocation={county:'',sublocation:''};
let currentSessionId='session_'+Date.now();
let isSpeaking=false;
let currentUtterance=null;
let currentTab='crops';

const countySublocations={
  'Nairobi':['Westlands','Dagoretti','Langata','Kibra','Roysambu','Kasarani','Ruaraka','Embakasi','Makadara','Kamukunji','Starehe','Mathare'],
  'Kiambu':['Limuru','Kikuyu','Kabete','Githunguri','Kiambaa','Ruiru','Juja','Thika','Gatundu','Lari'],
  'Nakuru':['Nakuru Town','Naivasha','Gilgil','Molo','Njoro','Rongai','Subukia','Bahati','Kuresoi'],
  'Kisumu':['Kisumu Central','Kisumu East','Kisumu West','Seme','Nyando','Muhoroni','Nyakach'],
  'Siaya':['Bondo','Rarieda','Ugenya','Ugunja','Gem','Alego Usonga'],
  'Kakamega':['Kakamega Town','Mumias','Butere','Khwisero','Shinyalu','Lurambi','Ikolomani','Lugari','Malava','Matungu','Navakholo'],
  'Bungoma':['Bungoma Town','Webuye','Kimilili','Bumula','Kanduyi','Sirisia','Kabuchai','Tongaren','Mt. Elgon'],
  'Meru':['Meru Town','Imenti North','Imenti South','Imenti Central','Tigania East','Tigania West','Igembe North','Igembe South','Igembe Central'],
  'Embu':['Embu Town','Manyatta','Runyenjes','Mbeere North','Mbeere South'],
  'Machakos':['Machakos Town','Kangundo','Matungulu','Kathiani','Mavoko','Yatta','Masinga','Mwala'],
  'Kitui':['Kitui Town','Mwingi','Kitui Central','Kitui West','Kitui East','Kitui South','Mwingi North','Mwingi Central'],
  'Nyeri':['Nyeri Town','Othaya','Tetu','Kieni','Mathira','Mukurweini'],
  "Murang'a":['Murang\'a Town','Kangema','Kiharu','Kigumo','Maragwa','Kandara','Gatanga'],
  'Kirinyaga':['Kerugoya','Kutus','Gichugu','Ndia','Kirinyaga Central','Mwea'],
  'Uasin Gishu':['Eldoret','Ainabkoi','Kapseret','Kesses','Moiben','Soy','Turbo']
};

const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function addBubble(htmlText,role,lang='en'){
  const row=document.createElement('div');
  row.className=`bubble-row ${role}`;
  const speakBtnHtml=role==='bot'?`<button class="speak-btn" title="Read aloud" data-text="" data-lang="${lang}">🔊</button>`:'';
  row.innerHTML=`
    <div class="avatar">${role==='bot'?'🌾':'👨🌾'}</div>
    <div class="bubble">
      <span class="bubble-text">${htmlText}</span>
      <div class="meta">
        ${speakBtnHtml}
        <span class="time">${now()}</span>
      </div>
    </div>`;
  if(role==='bot'){
    const plain=htmlText.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'');
    const speakBtn=row.querySelector('.speak-btn');
    speakBtn.dataset.text=plain;
    speakBtn.addEventListener('click',function(){onSpeakBtn(this);});
  }
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
  return row;
}

function showTyping(){
  removeTyping();
  const row=document.createElement('div');
  row.id='typing-row';
  row.className='bubble-row bot';
  row.innerHTML=`<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}
function removeTyping(){
  const t=document.getElementById('typing-row');
  if(t)t.remove();
}

function stopSpeaking(){
  window.speechSynthesis.cancel();
  isSpeaking=false;
  currentUtterance=null;
  if(activeSpeakBtn){activeSpeakBtn.classList.remove('active');activeSpeakBtn=null;}
}

function speak(text,onDone,lang='en-US'){
  stopSpeaking();
  isSpeaking=true;
  const sentences=text.match(/[^.!?]+[.!?]*/g)||[text];
  let i=0;
  function next(){
    if(i>=sentences.length||!isSpeaking){
      isSpeaking=false;
      if(onDone)onDone();
      return;
    }
    currentUtterance=new SpeechSynthesisUtterance(sentences[i++].trim());
    currentUtterance.lang=lang;
    currentUtterance.rate=0.93;
    currentUtterance.onend=next;
    currentUtterance.onerror=next;
    window.speechSynthesis.speak(currentUtterance);
  }
  next();
}

function onSpeakBtn(btn){
  if(btn.classList.contains('active')){
    stopSpeaking();
    return;
  }
  stopSpeaking();
  activeSpeakBtn=btn;
  btn.classList.add('active');
  const lang=btn.dataset.lang==='sw'?'sw-KE':'en-US';
  speak(btn.dataset.text,()=>{
    btn.classList.remove('active');
    activeSpeakBtn=null;
  },lang);
}

async function fetchReply(text){
  const wasInterrupted=isSpeaking;
  if(isSpeaking){
    stopSpeaking();
  }
  
  const r=await fetch('/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:text,
      session_id:currentSessionId,
      county:userLocation.county,
      sublocation:userLocation.sublocation,
      interrupted:wasInterrupted,
      context:currentTab
    })
  });
  const data=await r.json();
  return data;
}

async function sendMessage(text){
  text=(text||'').trim();
  if(!text)return;

  addBubble(text,'user');
  userInput.value='';
  showTyping();

  try{
    const data=await fetchReply(text);
    removeTyping();
    
    const detectedLang=data.language||'en';
    
    if(data.recommendations){
      // Display conversational response with crop cards
      let responseHtml=data.reply.replace(/\n/g,'<br>');
      addBubble(responseHtml,'bot',detectedLang);
      
      // Add crop recommendation cards with percentage
      const cardsHtml=data.recommendations.map((crop,idx)=>{
        const icons=['🥇','🥈','🥉'];
        const percentage=crop.score;
        return `
          <div class="crop-card">
            <div class="crop-header">
              <div class="crop-name">${icons[idx]} ${crop.name}</div>
              <div class="crop-score">${percentage}%</div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${percentage}%"></div>
            </div>
            <div class="crop-details">${crop.detail}</div>
          </div>
        `;
      }).join('');
      
      addBubble(cardsHtml,'bot',detectedLang);
    }else{
      // Regular text response
      const reply=typeof data==='string'?data:data.reply;
      addBubble(reply.replace(/\n/g,'<br>'),'bot',detectedLang);
    }
  }catch(e){
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.<br>Samahani, sikuweza kuunganisha. Tafadhali jaribu tena.','bot');
  }
}

sendBtn.addEventListener('click',()=>sendMessage(userInput.value));
userInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage(userInput.value);});



const SRClass=window.SpeechRecognition||window.webkitSpeechRecognition;
document.addEventListener('click',()=>{
  const u=new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
},{once:true});

if(SRClass){
  let recog=null;
  micBtn.addEventListener('click',()=>{
    if(micBtn.classList.contains('recording')){
      if(recog)recog.stop();
      micBtn.classList.remove('recording');
    }else{
      recog=new SRClass();
      recog.lang='en-US';
      recog.continuous=false;
      recog.interimResults=true;
      recog.onresult=e=>{
        userInput.value=Array.from(e.results).map(r=>r[0].transcript).join('');
      };
      recog.onend=()=>micBtn.classList.remove('recording');
      recog.onerror=()=>micBtn.classList.remove('recording');
      micBtn.classList.add('recording');
      try{recog.start();}catch(e){micBtn.classList.remove('recording');}
    }
  });
}else{
  micBtn.disabled=true;
  micBtn.style.opacity='.4';
}

function openLocationModal(){
  document.getElementById('locationModal').classList.add('show');
}

function closeLocationModal(){
  document.getElementById('locationModal').classList.remove('show');
}

document.getElementById('countySelect').addEventListener('change',function(){
  const county=this.value;
  const sublocationSelect=document.getElementById('sublocationSelect');
  
  if(county&&countySublocations[county]){
    sublocationSelect.disabled=false;
    sublocationSelect.innerHTML='<option value="">Select sub-location</option>';
    
    countySublocations[county].forEach(subloc=>{
      const option=document.createElement('option');
      option.value=subloc;
      option.textContent=subloc;
      sublocationSelect.appendChild(option);
    });
  }else{
    sublocationSelect.disabled=true;
    sublocationSelect.innerHTML='<option value="">Select county first</option>';
  }
});

function saveLocation(){
  const county=document.getElementById('countySelect').value;
  const sublocation=document.getElementById('sublocationSelect').value;
  
  if(!county){
    alert('Please select a county / Chagua kaunti');
    return;
  }
  
  if(!sublocation){
    alert('Please select a sub-location / Chagua eneo');
    return;
  }
  
  userLocation={county,sublocation};
  const displayText=`${sublocation}, ${county}`;
  document.getElementById('locationDisplay').textContent=displayText;
  closeLocationModal();
  
  // Load the current tab content
  loadTabContent(currentTab);
}

// Tab switching functionality
function switchTab(tabName){
  currentTab=tabName;
  
  // Update active tab button
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.remove('active');
    if(btn.dataset.tab===tabName){
      btn.classList.add('active');
    }
  });
  
  // Load tab content
  loadTabContent(tabName);
}

function loadTabContent(tabName){
  chatWindow.innerHTML='';
  
  if(!userLocation.county){
    chatWindow.innerHTML=`
      <div class="welcome-card">
        <h2>🌱 Welcome to Fahamu Shamba AI</h2>
        <p>Please set your location first to get personalized farming advice!</p>
        <p style="margin-top:8px;font-size:0.8rem;">Tafadhali weka eneo lako kwanza kupata ushauri wa kilimo!</p>
      </div>
    `;
    return;
  }
  
  switch(tabName){
    case 'crops':
      loadCropRecommendations();
      break;
    case 'weather':
      loadWeatherInfo();
      break;
    case 'pests':
      loadPestInfo();
      break;
    case 'market':
      loadMarketPrices();
      break;
    case 'general':
      loadGeneralQuestions();
      break;
  }
}

async function loadCropRecommendations(){
  chatWindow.innerHTML=`
    <div class="section-header">
      <h3>🌾 Top 3 Crop Recommendations for ${userLocation.sublocation}, ${userLocation.county}</h3>
      <p>Based on your soil type, current season, weather patterns, and market demand</p>
    </div>
  `;
  
  showTyping();
  
  const query=`I'm a farmer in ${userLocation.sublocation}, ${userLocation.county}. Give me the top 3 best crops to plant right now with detailed recommendations.`;
  
  try{
    const data=await fetchReply(query);
    removeTyping();
    
    if(data.recommendations){
      let responseHtml=data.reply.replace(/\n/g,'<br>');
      addBubble(responseHtml,'bot',data.language||'en');
      
      const cardsHtml=data.recommendations.map((crop,idx)=>{
        const icons=['🥇','🥈','🥉'];
        const percentage=crop.score;
        return `
          <div class="crop-card">
            <div class="crop-header">
              <div class="crop-name">${icons[idx]} ${crop.name}</div>
              <div class="crop-score">${percentage}%</div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${percentage}%"></div>
            </div>
            <div class="crop-details">${crop.detail}</div>
          </div>
        `;
      }).join('');
      
      addBubble(cardsHtml,'bot',data.language||'en');
    }
  }catch(e){
    removeTyping();
    addBubble('Error loading recommendations. Please try again.','bot');
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    if(!userLocation.county){
      openLocationModal();
    }else{
      loadTabContent(currentTab);
    }
  },500);
});
