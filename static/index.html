<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fahamu Shamba – Your Farming Advisor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark: #2d6a1f;
  --green-mid: #3d8a28;
  --green-light: #4fa832;
  --green-pale: #e5f0dc;
  --green-xpale: #eef7e6;
  --beige-bg: #f5f0e8;
  --beige-card: #f9f5ed;
  --beige-border: #e0d2b4;
  --beige-border2: #c8b99a;
  --beige-bar: #d4c4a0;
  --brown-text: #3b2d1a;
  --brown-mid: #6b5a3e;
  --brown-muted: #8a7455;
  --brown-hint: #9e8c72;
  --brown-placeholder: #b0a080;
  --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

body {
  background: #e8e2d6;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--font);
  padding: 20px;
}

.fs-app {
  display: flex;
  flex-direction: column;
  height: 760px;
  width: 420px;
  background: var(--beige-bg);
  border-radius: 20px;
  border: 0.5px solid var(--beige-border2);
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 60px rgba(45,106,31,0.18), 0 4px 12px rgba(0,0,0,0.1);
}

/* HEADER */
.fs-header {
  background: linear-gradient(135deg, #2d6a1f 0%, #3d8a28 60%, #4fa832 100%);
  padding: 14px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}
.fs-header-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.fs-logo {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.18);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid rgba(255,255,255,0.35);
  flex-shrink: 0;
}
.fs-logo svg { width: 24px; height: 24px; }
.fs-header-text { flex: 1; }
.fs-header-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.2px; line-height: 1.2; }
.fs-header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.fs-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.85); }
.fs-status-dot {
  width: 7px; height: 7px;
  background: #7eff5e; border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.fs-quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 0 2px; }
.fs-qa-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 10px;
  padding: 7px 8px;
  display: flex; align-items: center; gap: 7px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  text-align: left;
}
.fs-qa-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.02); }
.fs-qa-btn:active { transform: scale(0.97); }
.fs-qa-icon {
  font-size: 16px;
  width: 26px; height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.fs-qa-label { font-size: 11px; color: rgba(255,255,255,0.95); font-weight: 500; line-height: 1.2; }

/* LOCATION BAR */
.fs-location-bar {
  background: rgba(255,248,235,0.97);
  padding: 7px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--beige-bar);
  flex-shrink: 0;
}
.fs-location-icon { font-size: 13px; }
.fs-location-text { font-size: 12px; color: var(--brown-mid); flex: 1; }
.fs-location-text span { color: var(--green-dark); font-weight: 600; }
.fs-location-edit {
  font-size: 11px; color: var(--green-dark);
  background: none; border: 1px solid var(--green-dark);
  border-radius: 6px; padding: 3px 8px;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.fs-location-edit:hover { background: var(--green-dark); color: white; }

/* CHAT AREA */
.fs-chat {
  flex: 1; overflow-y: auto;
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 10px;
  background: var(--beige-bg);
  scrollbar-width: thin;
  scrollbar-color: var(--beige-border2) transparent;
}
.fs-chat::-webkit-scrollbar { width: 4px; }
.fs-chat::-webkit-scrollbar-thumb { background: var(--beige-border2); border-radius: 2px; }

.fs-date-divider {
  text-align: center; font-size: 11px; color: var(--brown-hint);
  margin: 4px 0; display: flex; align-items: center; gap: 8px;
}
.fs-date-divider::before, .fs-date-divider::after {
  content: ''; flex: 1; height: 0.5px; background: var(--beige-border2);
}

.fs-bubble-row { display: flex; gap: 8px; align-items: flex-end; }
.fs-bubble-row.bot { justify-content: flex-start; }
.fs-bubble-row.user { justify-content: flex-end; }

.fs-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--green-dark);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border: 1.5px solid var(--green-light);
}
.fs-avatar svg { width: 16px; height: 16px; }

.fs-bubble {
  max-width: 78%; padding: 10px 13px; border-radius: 16px;
  font-size: 13px; line-height: 1.5; position: relative;
}
.fs-bubble.bot {
  background: #ffffff; color: var(--brown-text);
  border-bottom-left-radius: 4px;
  border: 0.5px solid #ddd3b8;
}
.fs-bubble.user {
  background: var(--green-dark); color: #ffffff;
  border-bottom-right-radius: 4px;
}
.fs-bubble-time { font-size: 10px; color: rgba(0,0,0,0.35); margin-top: 4px; text-align: right; }
.fs-bubble.user .fs-bubble-time { color: rgba(255,255,255,0.6); }

.fs-typing {
  display: flex; align-items: center; gap: 4px;
  padding: 12px 14px;
  background: #fff; border-radius: 16px; border-bottom-left-radius: 4px;
  border: 0.5px solid #ddd3b8; width: fit-content;
}
.fs-dot {
  width: 6px; height: 6px; background: var(--green-dark); border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.fs-dot:nth-child(2) { animation-delay: 0.2s; }
.fs-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* RECOMMENDATION CARD */
.fs-rec-card {
  background: #fff; border: 0.5px solid #ddd3b8;
  border-radius: 14px; overflow: hidden; margin-top: 4px;
}
.fs-rec-header {
  background: var(--green-dark); padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.fs-rec-header-text { font-size: 12px; font-weight: 600; color: #fff; }
.fs-rec-header-sub { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 1px; }
.fs-rec-crops { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.fs-crop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: var(--beige-card); border-radius: 10px;
  border: 0.5px solid var(--beige-border); cursor: pointer;
  transition: background 0.15s;
}
.fs-crop-item:hover { background: #eee5cc; }
.fs-crop-rank {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.rank-1 { background: #f5c842; color: #6b4a00; }
.rank-2 { background: #b8b8b8; color: #3a3a3a; }
.rank-3 { background: #c8845a; color: #4a2010; }
.fs-crop-info { flex: 1; }
.fs-crop-name { font-size: 13px; font-weight: 600; color: #2d2010; }
.fs-crop-detail { font-size: 11px; color: var(--brown-muted); margin-top: 1px; }
.fs-crop-score {
  font-size: 12px; font-weight: 600; color: var(--green-dark);
  background: var(--green-pale); padding: 3px 8px; border-radius: 20px;
}

/* LOCATION MODAL */
.fs-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  align-items: center; justify-content: center;
}
.fs-modal.show { display: flex; }
.fs-modal-content {
  background: #fff; border-radius: 16px;
  padding: 20px; width: 340px; max-width: 90%;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.fs-modal-title { font-size: 16px; font-weight: 600; color: var(--brown-text); margin-bottom: 16px; }
.fs-form-group { margin-bottom: 14px; }
.fs-form-label { font-size: 12px; color: var(--brown-mid); margin-bottom: 6px; display: block; font-weight: 500; }
.fs-form-input, .fs-form-select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--beige-border2);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  background: var(--beige-bg); color: var(--brown-text);
}
.fs-form-input:focus, .fs-form-select:focus { outline: none; border-color: var(--green-dark); }
.fs-modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.fs-btn {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.fs-btn-cancel { background: var(--beige-border); color: var(--brown-mid); }
.fs-btn-cancel:hover { background: var(--beige-border2); }
.fs-btn-primary { background: var(--green-dark); color: #fff; }
.fs-btn-primary:hover { background: var(--green-mid); }

/* INPUT AREA */
.fs-input-area {
  background: #fff; border-top: 1px solid var(--beige-bar);
  padding: 10px 12px; flex-shrink: 0;
}
.fs-lang-row { display: flex; gap: 6px; margin-bottom: 8px; }
.fs-lang-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--beige-border2); background: none;
  color: var(--brown-muted); cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.fs-lang-btn.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }
.fs-input-row { display: flex; align-items: flex-end; gap: 8px; }
.fs-input-wrap {
  flex: 1; background: var(--beige-bg); border-radius: 22px;
  border: 1px solid var(--beige-border2);
  display: flex; align-items: flex-end; gap: 6px;
  padding: 8px 12px; transition: border-color 0.15s;
}
.fs-input-wrap:focus-within { border-color: var(--green-dark); }
.fs-textarea {
  flex: 1; background: none; border: none; outline: none;
  font-size: 13px; color: var(--brown-text); font-family: inherit;
  resize: none; max-height: 80px; line-height: 1.4; min-height: 18px;
}
.fs-textarea::placeholder { color: var(--brown-placeholder); }
.fs-send-btn {
  width: 40px; height: 40px; background: var(--green-dark);
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s, transform 0.1s;
}
.fs-send-btn:hover { background: var(--green-mid); }
.fs-send-btn:active { transform: scale(0.94); }

@media (max-width: 480px) {
  body { padding: 0; }
  .fs-app { width: 100%; height: 100vh; border-radius: 0; }
}
</style>
</head>
<body>

<div class="fs-app">

  <!-- HEADER -->
  <div class="fs-header">
    <div class="fs-header-top">
      <div class="fs-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 2 6 4.5 6 8c0 2.5 1.5 4.5 3.5 5.5L9 20h6l-.5-6.5C16.5 12.5 18 10.5 18 8c0-3.5-3-6-6-6z" fill="rgba(255,255,255,0.9)"/>
          <path d="M12 2 Q14 5 12 8 Q10 5 12 2Z" fill="#7eff5e" opacity="0.8"/>
          <rect x="11" y="20" width="2" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
        </svg>
      </div>
      <div class="fs-header-text">
        <div class="fs-header-title">Fahamu Shamba</div>
        <div class="fs-header-sub">Your Farming Advisor – Mshauri Wako wa Kilimo</div>
      </div>
      <div class="fs-status">
        <div class="fs-status-dot"></div>
        <span>Online</span>
      </div>
    </div>

    <div class="fs-quick-actions">
      <button class="fs-qa-btn" onclick="quickAction('What is the best crop to plant in my area right now?')">
        <div class="fs-qa-icon">🌾</div>
        <div class="fs-qa-label">Best Crop<br>to Plant</div>
      </button>
      <button class="fs-qa-btn" onclick="quickAction('Give me the current weather update and farming advice for my area')">
        <div class="fs-qa-icon">☀️</div>
        <div class="fs-qa-label">Weather<br>Update</div>
      </button>
      <button class="fs-qa-btn" onclick="quickAction('What pests and diseases should I watch out for this season?')">
        <div class="fs-qa-icon">🐛</div>
        <div class="fs-qa-label">Pest & Disease<br>Tips</div>
      </button>
      <button class="fs-qa-btn" onclick="quickAction('What are the current market prices for crops in Kenya?')">
        <div class="fs-qa-icon">📈</div>
        <div class="fs-qa-label">Market<br>Prices</div>
      </button>
    </div>
  </div>

  <!-- LOCATION BAR -->
  <div class="fs-location-bar">
    <span class="fs-location-icon">📍</span>
    <div class="fs-location-text">Location: <span id="locationDisplay">Not set</span></div>
    <button class="fs-location-edit" onclick="openLocationModal()">Change</button>
  </div>

  <!-- CHAT AREA -->
  <div class="fs-chat" id="chatArea">
    <div class="fs-date-divider">Today</div>
  </div>

  <!-- INPUT AREA -->
  <div class="fs-input-area">
    <div class="fs-lang-row">
      <button class="fs-lang-btn active" id="engBtn" onclick="setLang('en')">English</button>
      <button class="fs-lang-btn" id="swBtn" onclick="setLang('sw')">Kiswahili</button>
    </div>
    <div class="fs-input-row">
      <div class="fs-input-wrap">
        <textarea class="fs-textarea" id="msgInput" placeholder="Ask about your farm..." rows="1"
          oninput="autoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      </div>
      <button class="fs-send-btn" onclick="sendMsg()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- LOCATION MODAL -->
<div class="fs-modal" id="locationModal">
  <div class="fs-modal-content">
    <div class="fs-modal-title">📍 Set Your Location</div>
    <div class="fs-form-group">
      <label class="fs-form-label">County</label>
      <select class="fs-form-select" id="countySelect">
        <option value="">Select County</option>
        <option value="Nairobi">Nairobi</option>
        <option value="Kiambu">Kiambu</option>
        <option value="Nakuru">Nakuru</option>
        <option value="Kisumu">Kisumu</option>
        <option value="Siaya">Siaya</option>
        <option value="Kakamega">Kakamega</option>
        <option value="Bungoma">Bungoma</option>
        <option value="Meru">Meru</option>
        <option value="Embu">Embu</option>
        <option value="Machakos">Machakos</option>
        <option value="Kitui">Kitui</option>
        <option value="Nyeri">Nyeri</option>
        <option value="Murang'a">Murang'a</option>
        <option value="Kirinyaga">Kirinyaga</option>
        <option value="Uasin Gishu">Uasin Gishu</option>
      </select>
    </div>
    <div class="fs-form-group">
      <label class="fs-form-label">Sub-location</label>
      <select class="fs-form-select" id="sublocationSelect" disabled>
        <option value="">Select county first</option>
      </select>
    </div>
    <div class="fs-modal-actions">
      <button class="fs-btn fs-btn-cancel" onclick="closeLocationModal()">Cancel</button>
      <button class="fs-btn fs-btn-primary" onclick="saveLocation()">Save Location</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let userLocation = { county: '', village: '' };
let currentLang = 'en';
let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

// ── Utils ─────────────────────────────────────────────────────────────────────
const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('engBtn').classList.toggle('active', lang === 'en');
  document.getElementById('swBtn').classList.toggle('active', lang === 'sw');
  document.getElementById('msgInput').placeholder = lang === 'sw' ? 'Uliza kuhusu shamba lako...' : 'Ask about your farm...';
}

// ── County Sub-locations Data ────────────────────────────────────────────────
const countySublocations = {
  'Nairobi': ['Westlands', 'Dagoretti', 'Langata', 'Kibra', 'Roysambu', 'Kasarani', 'Ruaraka', 'Embakasi', 'Makadara', 'Kamukunji', 'Starehe', 'Mathare'],
  'Kiambu': ['Limuru', 'Kikuyu', 'Kabete', 'Githunguri', 'Kiambaa', 'Ruiru', 'Juja', 'Thika', 'Gatundu', 'Lari'],
  'Nakuru': ['Nakuru Town', 'Naivasha', 'Gilgil', 'Molo', 'Njoro', 'Rongai', 'Subukia', 'Bahati', 'Kuresoi'],
  'Kisumu': ['Kisumu Central', 'Kisumu East', 'Kisumu West', 'Seme', 'Nyando', 'Muhoroni', 'Nyakach'],
  'Siaya': ['Bondo', 'Rarieda', 'Ugenya', 'Ugunja', 'Gem', 'Alego Usonga'],
  'Kakamega': ['Kakamega Town', 'Mumias', 'Butere', 'Khwisero', 'Shinyalu', 'Lurambi', 'Ikolomani', 'Lugari', 'Malava', 'Matungu', 'Navakholo'],
  'Bungoma': ['Bungoma Town', 'Webuye', 'Kimilili', 'Bumula', 'Kanduyi', 'Sirisia', 'Kabuchai', 'Tongaren', 'Mt. Elgon'],
  'Meru': ['Meru Town', 'Imenti North', 'Imenti South', 'Imenti Central', 'Tigania East', 'Tigania West', 'Igembe North', 'Igembe South', 'Igembe Central'],
  'Embu': ['Embu Town', 'Manyatta', 'Runyenjes', 'Mbeere North', 'Mbeere South'],
  'Machakos': ['Machakos Town', 'Kangundo', 'Matungulu', 'Kathiani', 'Mavoko', 'Yatta', 'Masinga', 'Mwala'],
  'Kitui': ['Kitui Town', 'Mwingi', 'Kitui Central', 'Kitui West', 'Kitui East', 'Kitui South', 'Mwingi North', 'Mwingi Central'],
  'Nyeri': ['Nyeri Town', 'Othaya', 'Tetu', 'Kieni', 'Mathira', 'Mukurweini'],
  "Murang'a": ['Murang\'a Town', 'Kangema', 'Kiharu', 'Kigumo', 'Maragwa', 'Kandara', 'Gatanga'],
  'Kirinyaga': ['Kerugoya', 'Kutus', 'Gichugu', 'Ndia', 'Kirinyaga Central', 'Mwea'],
  'Uasin Gishu': ['Eldoret', 'Ainabkoi', 'Kapseret', 'Kesses', 'Moiben', 'Soy', 'Turbo']
};

// ── Location Modal ────────────────────────────────────────────────────────────
function openLocationModal() {
  document.getElementById('locationModal').classList.add('show');
}

function closeLocationModal() {
  document.getElementById('locationModal').classList.remove('show');
}

// Update sub-locations when county changes
document.getElementById('countySelect').addEventListener('change', function() {
  const county = this.value;
  const sublocationSelect = document.getElementById('sublocationSelect');
  
  if (county && countySublocations[county]) {
    sublocationSelect.disabled = false;
    sublocationSelect.innerHTML = '<option value="">Select sub-location</option>';
    
    countySublocations[county].forEach(subloc => {
      const option = document.createElement('option');
      option.value = subloc;
      option.textContent = subloc;
      sublocationSelect.appendChild(option);
    });
  } else {
    sublocationSelect.disabled = true;
    sublocationSelect.innerHTML = '<option value="">Select county first</option>';
  }
});

function saveLocation() {
  const county = document.getElementById('countySelect').value;
  const sublocation = document.getElementById('sublocationSelect').value;
  
  if (!county) {
    alert('Please select a county');
    return;
  }
  
  if (!sublocation) {
    alert('Please select a sub-location');
    return;
  }
  
  userLocation = { county, village: sublocation };
  const displayText = `${sublocation}, ${county}`;
  document.getElementById('locationDisplay').textContent = displayText;
  closeLocationModal();
  
  // Auto-trigger crop recommendation
  const query = `I am in ${displayText}, Kenya. What are the best crops to plant right now based on my location, soil, and current season?`;
  setTimeout(() => sendMsg(query), 300);
}

// ── Chat Functions ────────────────────────────────────────────────────────────
function addBotBubble(htmlText) {
  const chat = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'fs-bubble-row bot';
  row.innerHTML = `
    <div class="fs-avatar">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C9.5 3 7.5 5 7.5 8c0 1.8 1 3.4 2.5 4.3L9.5 18h5l-.5-5.7C15.5 11.4 16.5 9.8 16.5 8c0-3-2-5-4.5-5z" fill="rgba(255,255,255,0.9)"/></svg>
    </div>
    <div style="flex:1;max-width:85%;">
      <div class="fs-bubble bot" style="max-width:100%;">
        ${htmlText}
        <div class="fs-bubble-time">${now()} ✓✓</div>
      </div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addUserBubble(text) {
  const chat = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'fs-bubble-row user';
  row.innerHTML = `
    <div class="fs-bubble user">
      ${text}
      <div class="fs-bubble-time">${now()} ✓</div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  removeTyping();
  const chat = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.id = 'typingRow';
  row.className = 'fs-bubble-row bot';
  row.innerHTML = `
    <div class="fs-avatar">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C9.5 3 7.5 5 7.5 8c0 1.8 1 3.4 2.5 4.3L9.5 18h5l-.5-5.7C15.5 11.4 16.5 9.8 16.5 8c0-3-2-5-4.5-5z" fill="rgba(255,255,255,0.9)"/></svg>
    </div>
    <div class="fs-typing">
      <div class="fs-dot"></div>
      <div class="fs-dot"></div>
      <div class="fs-dot"></div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

function addRecommendationCard(crops, location) {
  const html = `
    <div class="fs-rec-card">
      <div class="fs-rec-header">
        <div>
          <div class="fs-rec-header-text">Top Crop Recommendations</div>
          <div class="fs-rec-header-sub">${location}</div>
        </div>
      </div>
      <div class="fs-rec-crops">
        ${crops.map((crop, i) => `
          <div class="fs-crop-item">
            <div class="fs-crop-rank rank-${i+1}">${i+1}</div>
            <div class="fs-crop-info">
              <div class="fs-crop-name">${crop.name}</div>
              <div class="fs-crop-detail">${crop.detail}</div>
            </div>
            <div class="fs-crop-score">${crop.score}%</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  addBotBubble(html);
}

// ── API Call ──────────────────────────────────────────────────────────────────
async function fetchReply(text) {
  const r = await fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, session_id: sessionId})
  });
  return (await r.json()).reply;
}

// ── Send Message ──────────────────────────────────────────────────────────────
async function sendMsg(customText) {
  const inp = document.getElementById('msgInput');
  const val = customText || inp.value.trim();
  if (!val) return;
  
  addUserBubble(val);
  inp.value = '';
  inp.style.height = 'auto';
  showTyping();
  
  try {
    const reply = await fetchReply(val);
    removeTyping();
    
    // Check if this is a crop recommendation query
    if (val.toLowerCase().includes('best crop') || val.toLowerCase().includes('what to plant') || val.toLowerCase().includes('recommend')) {
      // Parse structured crop recommendations
      const cropPattern = /CROP:\s*(.+?)\nDETAILS:\s*(.+?)\nSCORE:\s*(\d+)/g;
      const crops = [];
      let match;
      
      while ((match = cropPattern.exec(reply)) !== null) {
        crops.push({
          name: match[1].trim(),
          detail: match[2].trim(),
          score: parseInt(match[3])
        });
      }
      
      if (crops.length >= 3) {
        // Extract intro text (everything before first CROP:)
        const introEnd = reply.indexOf('CROP:');
        const intro = introEnd > 0 ? reply.substring(0, introEnd).trim() : 'Here are my recommendations:';
        addBotBubble(intro);
        
        // Show recommendation card
        const loc = userLocation.county ? `${userLocation.village || ''}, ${userLocation.county}`.trim() : 'Your Area';
        addRecommendationCard(crops.slice(0, 3), loc);
      } else {
        // Fallback to regular display
        addBotBubble(reply.replace(/\n/g, '<br>'));
      }
    } else {
      addBotBubble(reply.replace(/\n/g, '<br>'));
    }
  } catch(e) {
    removeTyping();
    addBotBubble('Sorry, I could not connect. Please try again.');
  }
}

function quickAction(text) {
  sendMsg(text);
}

// ── Initialize ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  addBotBubble(`Habari! I am <strong>Fahamu Shamba</strong>, your personal farm advisor. 🌱<br><br>To get started, please set your location by clicking <strong>Change</strong> above. I can then help you choose the right crops, monitor weather, manage pests, and track market prices.`);
  
  // Auto-open location modal after 1 second
  setTimeout(() => {
    if (!userLocation.county) {
      openLocationModal();
    }
  }, 1500);
});
</script>
