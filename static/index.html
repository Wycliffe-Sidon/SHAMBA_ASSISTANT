<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fahamu Shamba</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #2d6a2d, #4a8c3f);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    flex-shrink: 0;
  }
  header .logo {
    width: 44px; height: 44px;
    background: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header p  { font-size: 0.75rem; opacity: 0.85; }
  .status-dot {
    width: 9px; height: 9px;
    background: #7fff7f;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #7fff7f;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Quick Actions ── */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: #ede8dc;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid #d4c9b0;
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .qa-btn {
    white-space: nowrap;
    background: #fff;
    border: 1.5px solid #4a8c3f;
    color: #2d6a2d;
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .qa-btn:hover { background: #4a8c3f; color: #fff; }

  /* ── Chat Window ── */
  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a8c3f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  #chat-window::-webkit-scrollbar { width: 5px; }
  #chat-window::-webkit-scrollbar-thumb { background: #b5a98a; border-radius: 4px; }

  /* ── Bubbles ── */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .bubble-row.user  { flex-direction: row-reverse; }
  .bubble-row.bot   { flex-direction: row; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .bot  .avatar { background: #2d6a2d; color: #fff; }
  .user .avatar { background: #8b6914; color: #fff; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.88rem;
    line-height: 1.5;
    position: relative;
    word-break: break-word;
  }
  .bot  .bubble {
    background: #fff;
    color: #2c2c2c;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .user .bubble {
    background: #2d6a2d;
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .bubble .time {
    font-size: 0.65rem;
    opacity: 0.6;
    margin-top: 4px;
    text-align: right;
  }

  /* ── Typing indicator ── */
  .typing-dots span {
    display: inline-block;
    width: 7px; height: 7px;
    background: #4a8c3f;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

  /* ── Input Bar ── */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #ede8dc;
    border-top: 1px solid #d4c9b0;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1.5px solid #c4b896;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 0.88rem;
    background: #fff;
    outline: none;
    color: #2c2c2c;
    transition: border .2s;
  }
  #user-input:focus { border-color: #4a8c3f; }
  #user-input::placeholder { color: #a89870; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all .2s;
    flex-shrink: 0;
  }
  #mic-btn  { background: #e8e0cc; color: #5a4a2a; }
  #mic-btn:hover  { background: #d4c9b0; }
  #mic-btn.recording { background: #c0392b; color: #fff; animation: pulse 1s infinite; }
  #send-btn { background: #2d6a2d; color: #fff; }
  #send-btn:hover { background: #4a8c3f; transform: scale(1.05); }

  /* ── Welcome card ── */
  .welcome-card {
    background: linear-gradient(135deg, #2d6a2d, #4a8c3f);
    color: #fff;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    margin-bottom: 4px;
  }
  .welcome-card h2 { font-size: 1rem; margin-bottom: 4px; }
  .welcome-card p  { font-size: 0.78rem; opacity: 0.9; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🌾</div>
  <div>
    <h1>Fahamu Shamba</h1>
    <p>Your Farming Advisor</p>
  </div>
  <div class="status-dot"></div>
</header>

<!-- Quick Actions -->
<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('🌾 Best Crop to Plant')">🌾 Best Crop to Plant</button>
  <button class="qa-btn" onclick="quickAsk('☀️ Weather Update for Kenyan farmers')">☀️ Weather Update</button>
  <button class="qa-btn" onclick="quickAsk('🐛 Pest & Disease Tips for common crops')">🐛 Pest & Disease Tips</button>
  <button class="qa-btn" onclick="quickAsk('📈 Current Market Prices for crops in Kenya')">📈 Market Prices</button>
</div>

<!-- Chat Window -->
<div id="chat-window">
  <div class="welcome-card">
    <h2>🌱 Karibu! Welcome to Fahamu Shamba</h2>
    <p>Ask me about crops, weather, pests, or market prices. Niulize swali lolote la kilimo!</p>
  </div>
</div>

<!-- Input Bar -->
<div class="input-bar">
  <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
  <input type="text" id="user-input" placeholder="Ask about crops, weather, markets..." />
  <button class="icon-btn" id="send-btn" title="Send">➤</button>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addBubble(text, role) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;
    const avatar = role === 'bot' ? '🌾' : '👨‍🌾';
    row.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${text}<div class="time">${getTime()}</div></div>`;
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row bot';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="avatar">🌾</div>
      <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addBubble(text, 'user');
    input.value = '';
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addBubble(data.reply.replace(/\n/g, '<br>'), 'bot');
    } catch {
      removeTyping();
      addBubble('Sorry, I could not connect. Please try again.', 'bot');
    }
  }

  function quickAsk(text) { sendMessage(text); }

  sendBtn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

  // ── Voice Input ──
  let recognition = null;
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-KE';
    recognition.interimResults = false;
    recognition.onresult = e => {
      input.value = e.results[0][0].transcript;
      micBtn.classList.remove('recording');
    };
    recognition.onend = () => micBtn.classList.remove('recording');
    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('recording')) {
        recognition.stop();
      } else {
        micBtn.classList.add('recording');
        recognition.start();
      }
    });
  } else {
    micBtn.title = 'Voice not supported in this browser';
    micBtn.style.opacity = '0.4';
  }
</script>
</body>
</html>
