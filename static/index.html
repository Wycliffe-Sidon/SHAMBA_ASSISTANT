<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Fahamu Shamba</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Segoe UI',sans-serif;background:#f5f0e8;display:flex;flex-direction:column}

/* Header */
header{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
header h1{font-size:0.95rem;font-weight:700}
header p{font-size:0.7rem;opacity:0.85}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;background:#7fff7f;border-radius:50%;animation:blink 2s infinite}

/* Quick actions */
.quick-actions{display:flex;gap:6px;padding:8px 12px;background:#ede8dc;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #d4c9b0}
.quick-actions::-webkit-scrollbar{display:none}
.qa-btn{white-space:nowrap;background:#fff;border:1.5px solid #4a8c3f;color:#2d6a2d;padding:5px 10px;border-radius:18px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.qa-btn:hover{background:#4a8c3f;color:#fff}

/* Chat */
#chat-window{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:8px;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%234a8c3f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
#chat-window::-webkit-scrollbar{width:4px}
#chat-window::-webkit-scrollbar-thumb{background:#b5a98a;border-radius:2px}

/* Bubbles */
.bubble-row{display:flex;align-items:flex-end;gap:6px}
.bubble-row.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bot .avatar{background:#2d6a2d;color:#fff}
.user .avatar{background:#8b6914;color:#fff}
.bubble{max-width:80%;padding:8px 11px;border-radius:16px;font-size:0.82rem;line-height:1.5;word-break:break-word}
.bot .bubble{background:#fff;color:#2c2c2c;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.user .bubble{background:#2d6a2d;color:#fff;border-bottom-right-radius:4px}
.bubble-text{display:block;margin-bottom:3px}
.bubble img{max-width:100%;border-radius:8px;margin-bottom:5px;display:block}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:2px}
.time{font-size:0.6rem;opacity:0.5}
.speak-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 3px;opacity:0.5;transition:opacity .2s}
.speak-btn:hover{opacity:1}
.speak-btn.active{opacity:1;animation:blink .8s infinite}

/* Typing */
.typing-dots span{display:inline-block;width:6px;height:6px;background:#4a8c3f;border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* Image preview */
#image-preview-bar{display:none;align-items:center;gap:8px;padding:6px 12px;background:#e8e0cc;border-top:1px solid #d4c9b0;flex-shrink:0}
#image-preview-bar.show{display:flex}
#image-preview-bar img{height:45px;width:45px;object-fit:cover;border-radius:6px;border:2px solid #4a8c3f}
#image-preview-bar span{font-size:0.75rem;color:#5a4a2a;flex:1}
#remove-image{background:none;border:none;font-size:16px;cursor:pointer;color:#c0392b}

/* Input bar */
.input-bar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#ede8dc;border-top:1px solid #d4c9b0;flex-shrink:0}
#user-input{flex:1;border:1.5px solid #c4b896;border-radius:20px;padding:8px 13px;font-size:0.82rem;background:#fff;outline:none;color:#2c2c2c}
#user-input:focus{border-color:#4a8c3f}
#user-input::placeholder{color:#a89870}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
#img-btn{background:#e8e0cc;color:#5a4a2a}
#img-btn:hover{background:#d4c9b0}
#mic-btn{background:#e8e0cc;color:#5a4a2a}
#mic-btn.recording{background:#c0392b;color:#fff}
#send-btn{background:#2d6a2d;color:#fff}
#send-btn:hover{background:#4a8c3f}

.welcome-card{background:linear-gradient(135deg,#2d6a2d,#4a8c3f);color:#fff;border-radius:14px;padding:14px;text-align:center}
.welcome-card h2{font-size:0.9rem;margin-bottom:3px}
.welcome-card p{font-size:0.72rem;opacity:0.9;line-height:1.4}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* Tablet */
@media (min-width:768px){
  header{padding:12px 16px}
  .logo{width:40px;height:40px;font-size:20px}
  header h1{font-size:1rem}
  header p{font-size:0.72rem}
  .quick-actions{padding:9px 14px;gap:7px}
  .qa-btn{padding:6px 11px;font-size:0.75rem}
  #chat-window{padding:14px}
  .bubble{font-size:0.85rem;padding:9px 12px}
  .avatar{width:30px;height:30px}
  .input-bar{padding:9px 12px;gap:7px}
  #user-input{padding:9px 14px;font-size:0.85rem}
  .icon-btn{width:38px;height:38px;font-size:17px}
}

/* Desktop */
@media (min-width:1024px){
  header{padding:14px 18px}
  .logo{width:42px;height:42px;font-size:22px}
  header h1{font-size:1.05rem}
  header p{font-size:0.75rem}
  .quick-actions{padding:10px 16px;gap:8px}
  .qa-btn{padding:7px 12px;font-size:0.78rem}
  #chat-window{padding:16px}
  .bubble{font-size:0.88rem;padding:10px 13px}
  .avatar{width:32px;height:32px;font-size:15px}
  .input-bar{padding:10px 14px;gap:8px}
  #user-input{padding:10px 15px;font-size:0.88rem}
  .icon-btn{width:40px;height:40px;font-size:18px}
}
</style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div>
    <h1>Fahamu Shamba</h1>
    <p>Your Farming Advisor</p>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
  </div>
</header>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('What is the best crop to plant in Kenya right now?')">🌾 Best Crop</button>
  <button class="qa-btn" onclick="quickAsk('Give me weather update for Kenyan farmers')">☀️ Weather</button>
  <button class="qa-btn" onclick="quickAsk('Common pests and diseases in Kenya')">🐛 Pest Tips</button>
  <button class="qa-btn" onclick="quickAsk('Current market prices for crops in Kenya')">📈 Market Prices</button>
  <button class="qa-btn" onclick="document.getElementById('file-input').click()">📷 Upload Photo</button>
</div>

<div id="chat-window">
  <div class="welcome-card">
    <h2>🌱 Karibu! Welcome to Fahamu Shamba</h2>
    <p>Ask me about crops, weather, pests or markets. Upload a crop photo for pest/disease diagnosis.</p>
  </div>
</div>

<div id="image-preview-bar">
  <img id="preview-thumb" src="" alt="preview"/>
  <span id="preview-name">Image ready</span>
  <button id="remove-image">✕</button>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none"/>

<div class="input-bar">
  <button class="icon-btn" id="img-btn" title="Upload image">📷</button>
  <input type="text" id="user-input" placeholder="Ask about crops, weather, markets..."/>
  <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
  <button class="icon-btn" id="send-btn">➤</button>
</div>

<script>
const chatWindow=document.getElementById('chat-window');
const userInput=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const micBtn=document.getElementById('mic-btn');
const imgBtn=document.getElementById('img-btn');
const fileInput=document.getElementById('file-input');
const previewBar=document.getElementById('image-preview-bar');
const previewThumb=document.getElementById('preview-thumb');
const previewName=document.getElementById('preview-name');
const removeImageBtn=document.getElementById('remove-image');

let selectedFile=null;
let activeSpeakBtn=null;

const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function addBubble(htmlText,role,imgUrl=null){
  const row=document.createElement('div');
  row.className=`bubble-row ${role}`;
  const imgTag=imgUrl?`<img src="${imgUrl}" alt="crop"/>`:'';
  const speakBtnHtml=role==='bot'?`<button class="speak-btn" title="Read aloud" data-text="">🔊</button>`:'';
  row.innerHTML=`
    <div class="avatar">${role==='bot'?'🌾':'👨🌾'}</div>
    <div class="bubble">
      ${imgTag}
      <span class="bubble-text">${htmlText}</span>
      <div class="meta">
        ${speakBtnHtml}
        <span class="time">${now()}</span>
      </div>
    </div>`;
  if(role==='bot'){
    const plain=htmlText.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'');
    row.querySelector('.speak-btn').dataset.text=plain;
    row.querySelector('.speak-btn').addEventListener('click',function(){onSpeakBtn(this);});
  }
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
  return row;
}

function showTyping(){
  removeTyping();
  const row=document.createElement('div');
  row.id='typing-row';
  row.className='bubble-row bot';
  row.innerHTML=`<div class="avatar">🌾</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(row);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}
function removeTyping(){
  const t=document.getElementById('typing-row');
  if(t)t.remove();
}

function stopSpeaking(){
  window.speechSynthesis.cancel();
  if(activeSpeakBtn){activeSpeakBtn.classList.remove('active');activeSpeakBtn=null;}
}

function speak(text,onDone){
  stopSpeaking();
  const sentences=text.match(/[^.!?]+[.!?]*/g)||[text];
  let i=0;
  function next(){
    if(i>=sentences.length){if(onDone)onDone();return;}
    const utt=new SpeechSynthesisUtterance(sentences[i++].trim());
    utt.lang='en-US';
    utt.rate=0.93;
    utt.onend=next;
    utt.onerror=next;
    window.speechSynthesis.speak(utt);
  }
  next();
}

function onSpeakBtn(btn){
  if(btn.classList.contains('active')){
    stopSpeaking();
    return;
  }
  stopSpeaking();
  activeSpeakBtn=btn;
  btn.classList.add('active');
  speak(btn.dataset.text,()=>{
    btn.classList.remove('active');
    activeSpeakBtn=null;
  });
}

async function fetchReply(text,file){
  if(file){
    const fd=new FormData();
    fd.append('image',file);
    fd.append('message',text||'Identify any pest, disease, or crop condition in this image.');
    const r=await fetch('/analyze-image',{method:'POST',body:fd});
    return(await r.json()).reply;
  }
  const r=await fetch('/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:text})
  });
  return(await r.json()).reply;
}

async function sendMessage(text,file=null){
  text=(text||'').trim();
  if(!text&&!file)return;

  const imgUrl=file?URL.createObjectURL(file):null;
  addBubble(text||'📷 Analyze this crop image.','user',imgUrl);
  userInput.value='';
  clearImagePreview();
  showTyping();

  try{
    const reply=await fetchReply(text,file);
    removeTyping();
    addBubble(reply.replace(/\n/g,'<br>'),'bot');
  }catch(e){
    removeTyping();
    addBubble('Sorry, I could not connect. Please try again.','bot');
  }
}

function quickAsk(text){sendMessage(text,null);}

sendBtn.addEventListener('click',()=>sendMessage(userInput.value,selectedFile));
userInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage(userInput.value,selectedFile);});

function clearImagePreview(){
  selectedFile=null;
  previewBar.classList.remove('show');
  previewThumb.src='';
  fileInput.value='';
  userInput.placeholder='Ask about crops, weather, markets...';
}
function handleFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  selectedFile=file;
  previewThumb.src=URL.createObjectURL(file);
  previewName.textContent=file.name;
  previewBar.classList.add('show');
  userInput.placeholder='Add a question about this image (optional)...';
  userInput.focus();
}
imgBtn.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
removeImageBtn.addEventListener('click',clearImagePreview);
chatWindow.addEventListener('dragover',e=>e.preventDefault());
chatWindow.addEventListener('drop',e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);});

const SRClass=window.SpeechRecognition||window.webkitSpeechRecognition;
document.addEventListener('click',()=>{
  const u=new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
},{once:true});

if(SRClass){
  let recog=null;
  micBtn.addEventListener('click',()=>{
    if(micBtn.classList.contains('recording')){
      if(recog)recog.stop();
      micBtn.classList.remove('recording');
    }else{
      recog=new SRClass();
      recog.lang='en-US';
      recog.continuous=false;
      recog.interimResults=true;
      recog.onresult=e=>{
        userInput.value=Array.from(e.results).map(r=>r[0].transcript).join('');
      };
      recog.onend=()=>micBtn.classList.remove('recording');
      recog.onerror=()=>micBtn.classList.remove('recording');
      micBtn.classList.add('recording');
      try{recog.start();}catch(e){micBtn.classList.remove('recording');}
    }
  });
}else{
  micBtn.disabled=true;
  micBtn.style.opacity='.4';
}
</script>
</body>
</html>
